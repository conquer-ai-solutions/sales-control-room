<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conquer AI — Sales Operations Control Room</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2337A584'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='700' font-size='18'%3EC%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/geist-mono" rel="stylesheet">
<style>
  :root {
    /* Conquer Intel Design System */
    --bg: #141414;
    --bg-elevated: #1A1A1A;
    --bg-card: #1E1E1E;
    --bg-card-hover: #252525;
    --bg-panel: #1A1A1A;
    --bg-surface: #222222;
    --border: #3C3C3C;
    --border-light: #4A4A4A;

    --text: #EFEFEF;
    --text-secondary: #D3D3D3;
    --text-dim: #8A8A8A;
    --text-muted: #616161;

    --accent: #37A584;
    --accent-hover: #2E8E72;
    --accent-glow: rgba(55,165,132,0.15);
    --accent-subtle: rgba(55,165,132,0.08);

    --teal: #37A584;
    --teal-bg: rgba(55,165,132,0.1);
    --orange: #F5A623;
    --orange-bg: rgba(245,166,35,0.1);
    --red: #EC3540;
    --red-bg: rgba(236,53,64,0.08);
    --blue: #6D7287;
    --blue-bg: rgba(109,114,135,0.1);

    --stage-intro: #616161;
    --stage-discovery: #D97706;
    --stage-poc: #37A584;
    --stage-proposal: #6D7287;
    --stage-procurement: #8B6CC1;
    --stage-signed: #37A584;

    --radius: 5px;
    --radius-lg: 5px;
    --font: 'Geist Mono', 'Inter', monospace, system-ui, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); overflow-x:hidden; -webkit-font-smoothing:antialiased; }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--border-light); }

  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px; }
  .loading-spinner { width:36px; height:36px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { transform:translateX(100%); } to { transform:translateX(0); } }

  /* HEADER */
  .header {
    background:rgba(20,20,20,0.95);
    border-bottom:1px solid var(--border);
    padding:0 32px;
    height:60px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
    backdrop-filter:blur(16px);
  }
  .header-left { display:flex; align-items:center; gap:20px; }
  .logo { display:flex; align-items:baseline; gap:2px; }
  .logo-conquer { font-size:18px; font-weight:700; color:var(--text); letter-spacing:-0.3px; }
  .logo-ai { font-size:18px; font-weight:300; color:var(--text-dim); }
  .logo-divider { width:1px; height:20px; background:var(--border); margin:0 12px; align-self:center; }
  .logo-product { font-size:13px; font-weight:500; color:var(--accent); letter-spacing:0.3px; }
  .header-right { display:flex; align-items:center; gap:10px; }

  .view-toggle { display:flex; background:var(--bg); border-radius:var(--radius); padding:2px; border:1px solid var(--border); }
  .view-btn { padding:5px 14px; border-radius:6px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; font-size:12px; font-weight:500; font-family:var(--font); transition:all 0.2s; }
  .view-btn.active { background:var(--accent); color:white; }
  .view-btn:hover:not(.active) { color:var(--text-dim); }

  .refresh-btn { padding:6px 12px; border-radius:var(--radius); border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; font-family:var(--font); transition:all 0.15s; }
  .refresh-btn:hover { border-color:var(--accent); color:var(--text); }

  .timestamp { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }

  /* STATS */
  .stats-bar { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; padding:20px 32px 12px; }
  @media (max-width:1200px) { .stats-bar { grid-template-columns:repeat(3,1fr); } }
  @media (max-width:768px) { .stats-bar { grid-template-columns:repeat(2,1fr); } }
  .stat-card {
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:14px 16px;
    transition:all 0.2s;
    position:relative;
    overflow:hidden;
  }
  .stat-card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:2px;
  }
  .stat-card:nth-child(1)::before { background:var(--accent); }
  .stat-card:nth-child(2)::before { background:var(--teal); }
  .stat-card:nth-child(3)::before { background:var(--stage-procurement); }
  .stat-card:nth-child(4)::before { background:var(--orange); }
  .stat-card:nth-child(5)::before { background:var(--red); }
  .stat-card:nth-child(6)::before { background:var(--blue); }
  .stat-card:hover { border-color:var(--border-light); }
  .stat-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); margin-bottom:6px; }
  .stat-value { font-size:24px; font-weight:700; letter-spacing:-1px; font-variant-numeric:tabular-nums; }
  .stat-sub { font-size:11px; color:var(--text-dim); margin-top:3px; }
  .stat-row { display:flex; align-items:baseline; gap:8px; }
  .stat-badge { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:600; }

  /* FILTERS */
  .filter-bar { display:flex; gap:6px; padding:8px 32px 16px; flex-wrap:wrap; align-items:center; }
  .search-input { padding:6px 14px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-size:13px; font-family:var(--font); width:220px; transition:border-color 0.15s; }
  .search-input:focus { outline:none; border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-muted); }
  .filter-chip { padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:11px; font-weight:500; font-family:var(--font); cursor:pointer; transition:all 0.15s; text-transform:uppercase; letter-spacing:0.3px; }
  .filter-chip.active { border-color:var(--accent); background:var(--accent-subtle); color:var(--accent); }
  .filter-chip:hover:not(.active) { border-color:var(--border-light); color:var(--text-dim); }
  .filter-sep { width:1px; height:18px; background:var(--border); margin:0 4px; }

  /* KANBAN */
  .kanban-container { display:flex; gap:10px; padding:0 32px 32px; overflow-x:auto; min-height:calc(100vh - 240px); }
  .kanban-col { min-width:270px; max-width:310px; flex:1; display:flex; flex-direction:column; }
  .kanban-header { padding:10px 14px; border-radius:var(--radius-lg) var(--radius-lg) 0 0; display:flex; align-items:center; justify-content:space-between; }
  .kanban-header h3 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:white; }
  .kanban-value { font-size:11px; color:rgba(255,255,255,0.6); font-weight:500; }
  .kanban-count { background:rgba(255,255,255,0.15); padding:2px 7px; border-radius:8px; font-size:10px; font-weight:600; color:white; }
  .kanban-cards { flex:1; display:flex; flex-direction:column; gap:6px; padding:6px 2px; overflow-y:auto; max-height:calc(100vh - 320px); transition:background 0.2s; }
  .kanban-cards.drag-over { background:rgba(55,165,132,0.08); border-radius:var(--radius); }
  .deal-card[draggable="true"] { cursor:grab; }
  .deal-card[draggable="true"]:active { cursor:grabbing; }
  .deal-card.dragging { opacity:0.4; transform:scale(0.97); }

  /* DEAL CARDS */
  .deal-card {
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:12px 14px;
    cursor:pointer;
    transition:all 0.15s;
    animation:fadeIn 0.3s ease;
  }
  .deal-card:hover { border-color:var(--border-light); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.4); }
  .deal-card.stalled { border-left:3px solid var(--red); }
  .deal-card.overdue { border-left:3px solid var(--orange); }
  .deal-name { font-size:13px; font-weight:600; margin-bottom:3px; line-height:1.3; }
  .deal-project { font-size:11px; color:var(--text-dim); margin-bottom:8px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .deal-meta { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
  .deal-tag { font-size:9px; padding:2px 7px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
  .tag-region { background:var(--blue-bg); color:var(--blue); }
  .tag-value { background:var(--teal-bg); color:var(--teal); }
  .tag-stalled { background:var(--red-bg); color:var(--red); }
  .tag-overdue { background:var(--orange-bg); color:var(--orange); }
  .tag-friendly { background:rgba(107,114,219,0.15); color:#6B72DB; }
  .deal-action { font-size:11px; color:var(--text-dim); padding-top:8px; border-top:1px solid rgba(30,34,100,0.5); display:flex; align-items:start; gap:5px; line-height:1.4; }
  .deal-action-arrow { color:var(--accent); font-weight:600; flex-shrink:0; }
  .deal-due { font-size:10px; color:var(--text-muted); margin-top:4px; }
  .deal-due.overdue { color:var(--orange); font-weight:600; }
  .deal-owner-row { display:flex; align-items:center; gap:6px; margin-top:6px; }
  .deal-owner-avatar { width:18px; height:18px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:white; flex-shrink:0; }
  .deal-owner-name { font-size:10px; color:var(--text-muted); }
  .deal-intel-badge { font-size:9px; color:var(--accent); opacity:0.7; margin-top:4px; font-weight:600; letter-spacing:0.3px; }

  /* TABLE VIEW */
  .table-container { padding:0 32px 32px; overflow-x:auto; }
  .data-table { width:100%; border-collapse:separate; border-spacing:0; }
  .data-table th { padding:10px 14px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-muted); text-align:left; border-bottom:1px solid var(--border); position:sticky; top:60px; background:var(--bg); z-index:10; }
  .data-table td { padding:10px 14px; font-size:13px; border-bottom:1px solid rgba(30,34,100,0.3); vertical-align:middle; }
  .data-table tr { transition:background 0.1s; cursor:pointer; }
  .data-table tbody tr:hover { background:var(--bg-card); }
  .stage-badge { display:inline-block; padding:3px 10px; border-radius:5px; font-size:10px; font-weight:600; color:white; text-transform:uppercase; letter-spacing:0.3px; }

  /* DETAIL PANEL */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; backdrop-filter:blur(6px); }
  .detail-panel { position:fixed; top:0; right:0; width:520px; max-width:92vw; height:100vh; background:var(--bg-panel); border-left:1px solid var(--border); z-index:201; overflow-y:auto; animation:slideIn 0.2s ease; }
  .panel-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:start; justify-content:space-between; position:sticky; top:0; background:var(--bg-panel); z-index:1; }
  .panel-close { background:none; border:1px solid var(--border); border-radius:6px; color:var(--text-dim); cursor:pointer; font-size:16px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .panel-close:hover { color:var(--text); border-color:var(--border-light); }
  .panel-body { padding:20px 24px; }
  .panel-section { margin-bottom:24px; }
  .panel-section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:10px; }
  .panel-field { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(30,34,100,0.3); }
  .panel-field-label { font-size:12px; color:var(--text-dim); }
  .panel-field-value { font-size:13px; font-weight:500; text-align:right; max-width:60%; }

  .edit-field { width:100%; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:13px; font-family:var(--font); transition:border-color 0.15s; }
  .edit-field:focus { outline:none; border-color:var(--accent); }
  select.edit-field { cursor:pointer; }
  textarea.edit-field { min-height:60px; resize:vertical; }
  .edit-row { margin-bottom:12px; }
  .edit-label { font-size:10px; font-weight:600; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }

  .btn { padding:8px 18px; border-radius:var(--radius); border:none; font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer; transition:all 0.15s; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:var(--accent-hover); }
  .btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
  .btn-secondary:hover { border-color:var(--border-light); color:var(--text); }
  .btn-row { display:flex; gap:8px; margin-top:16px; }

  .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; background:var(--teal); color:var(--bg); border-radius:var(--radius); font-size:13px; font-weight:600; z-index:300; animation:fadeIn 0.2s ease; box-shadow:0 4px 16px rgba(78,205,196,0.3); }

  .stage-modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px 32px; z-index:210; width:440px; max-width:90vw; animation:fadeIn 0.15s ease; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .stage-modal-title { font-size:15px; font-weight:700; margin-bottom:4px; }
  .stage-modal-sub { font-size:12px; color:var(--text-dim); margin-bottom:20px; }
  .stage-modal-arrow { display:inline-flex; align-items:center; gap:8px; margin-bottom:16px; font-size:13px; }
  .stage-modal-badge { display:inline-block; padding:3px 10px; border-radius:var(--radius); color:white; font-size:12px; font-weight:600; }
  .stage-modal-notes { width:100%; min-height:80px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; color:var(--text); font-family:var(--font); font-size:13px; resize:vertical; }
  .stage-modal-notes:focus { outline:none; border-color:var(--accent); }
  .stage-modal-notes::placeholder { color:var(--text-muted); }
  .stage-modal-label { font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
  .stage-modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

  .empty-state { padding:32px; text-align:center; color:var(--text-muted); font-size:12px; }

  /* ACCOUNT VIEW */
  .account-view-wrapper { min-height:100vh; background:var(--bg); }
  .account-header {
    background:rgba(20,20,20,0.95);
    border-bottom:1px solid var(--border);
    padding:20px 32px;
    position:sticky; top:0; z-index:90;
    backdrop-filter:blur(16px);
  }
  .account-header-top { display:flex; align-items:center; gap:16px; margin-bottom:0; }
  .back-btn { background:none; border:1px solid var(--border); padding:6px 12px; border-radius:var(--radius); color:var(--text-dim); cursor:pointer; font-size:13px; font-family:var(--font); transition:all 0.15s; }
  .back-btn:hover { border-color:var(--accent); color:var(--text); }
  .account-title { flex:1; }
  .account-name { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .account-meta { display:flex; gap:12px; align-items:center; font-size:12px; color:var(--text-dim); }
  .stage-badge-lg { display:inline-block; padding:4px 12px; border-radius:6px; font-size:11px; font-weight:600; color:white; text-transform:uppercase; letter-spacing:0.3px; }
  .header-edit-btn { background:none; border:1px solid var(--border); padding:6px 16px; border-radius:var(--radius); color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:500; font-family:var(--font); transition:all 0.15s; }
  .header-edit-btn:hover { border-color:var(--accent); color:var(--accent); }

  .tab-bar { display:flex; gap:2px; border-bottom:1px solid var(--border); padding:0 32px; margin:12px 0 0 0; }
  .tab-btn { padding:12px 20px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:500; font-family:var(--font); border-bottom:2px solid transparent; transition:all 0.15s; }
  .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-btn:hover:not(.active) { color:var(--text-dim); }

  .tab-content { padding:28px 32px; max-width:960px; }

  /* OVERVIEW HERO CARDS */
  .overview-hero { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; }
  .hero-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; }
  .hero-card-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:10px; }
  .hero-card-action { font-size:15px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:8px; }
  .hero-card-meta { font-size:12px; color:var(--text-dim); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .hero-due-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .hero-due-overdue { background:var(--red-bg); color:var(--red); }
  .hero-due-soon { background:var(--orange-bg); color:var(--orange); }
  .hero-due-ok { background:var(--accent-subtle); color:var(--accent); }
  .hero-value { font-size:22px; font-weight:700; color:var(--accent); }
  .hero-value-sub { font-size:12px; color:var(--text-dim); margin-top:4px; }

  /* OVERVIEW GRID */
  .overview-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .overview-grid-full { grid-column:1 / -1; }

  /* ENGAGEMENT PULSE BAR */
  .pulse-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
  .pulse-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; text-align:center; }
  .pulse-value { font-size:22px; font-weight:700; color:var(--text); letter-spacing:-0.5px; font-variant-numeric:tabular-nums; }
  .pulse-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); margin-top:4px; }

  /* TIMING BAR */
  .timing-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
  .timing-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:12px 16px; text-align:center; }
  .timing-value { font-size:14px; font-weight:600; color:var(--text); margin-bottom:2px; font-variant-numeric:tabular-nums; }
  .timing-label { font-size:10px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }

  /* QUALIFICATION SCORECARD */
  .qual-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 20px; margin-bottom:16px; }
  .qual-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .qual-item { display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 8px; border-radius:var(--radius); border:1px solid var(--border); transition:all 0.15s; }
  .qual-item-yes { border-color:rgba(55,165,132,0.3); background:rgba(55,165,132,0.05); }
  .qual-item-no { border-color:rgba(236,53,64,0.2); background:rgba(236,53,64,0.03); }
  .qual-item-unknown { border-color:var(--border); }
  .qual-icon { font-size:16px; font-weight:700; }
  .qual-item-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; color:var(--text-dim); text-align:center; }

  /* KEY CONTEXT CARD */
  .context-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 20px; margin-bottom:16px; }
  .context-summary { font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:12px; }
  .context-meta { display:flex; flex-wrap:wrap; gap:8px; }

  @media (max-width:768px) {

  /* FIELD GROUP CARD */
  .field-group { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 20px; }
  .field-group-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .field-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; }
  .field-row + .field-row { border-top:1px solid rgba(60,60,60,0.3); }
  .field-label { font-size:12px; color:var(--text-dim); }
  .field-value { font-size:13px; font-weight:500; color:var(--text); text-align:right; max-width:60%; }
  .field-value-empty { color:var(--text-muted); font-style:italic; font-weight:400; }
  .field-value-status { display:inline-flex; align-items:center; gap:6px; }
  .status-dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
  .status-dot-active { background:var(--accent); }
  .status-dot-stalled { background:var(--red); }

  /* EDIT FORM SECTIONS */
  .edit-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; }
  .edit-section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; }
  .edit-grid-full { grid-column:1 / -1; }

  /* ACTIVITY TIMELINE */
  .activity-timeline { margin-top:32px; }
  .activity-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid rgba(30,34,100,0.3); }
  .activity-item:last-child { border-bottom:none; }
  .activity-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); margin-top:6px; flex-shrink:0; }
  .activity-content { flex:1; }
  .activity-text { font-size:13px; color:var(--text); margin-bottom:2px; }
  .activity-time { font-size:11px; color:var(--text-muted); }

  /* TASKS */
  .tasks-list { display:flex; flex-direction:column; gap:12px; }
  .task-item {
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:12px 14px;
    display:flex; gap:12px;
  }
  .task-checkbox { width:18px; height:18px; min-width:18px; accent-color:var(--accent); cursor:pointer; }
  .task-details { flex:1; }
  .task-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:4px; }
  .task-title.completed { text-decoration:line-through; color:var(--text-muted); }
  .task-description { font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .task-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .task-badge { font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; text-transform:uppercase; }
  .badge-low { background:var(--blue-bg); color:var(--blue); }
  .badge-medium { background:var(--orange-bg); color:var(--orange); }
  .badge-high { background:var(--red-bg); color:var(--red); }
  .badge-critical { background:var(--red-bg); color:var(--red); font-weight:700; }
  .badge-intel { background:var(--teal-bg); color:var(--teal); }
  .badge-manual { background:var(--blue-bg); color:var(--blue); }
  .task-overdue { color:var(--orange); font-weight:600; }

  /* GAMEPLAN */
  .gameplan-container { display:flex; flex-direction:column; gap:24px; }
  .stage-section { margin-bottom:20px; }
  .stage-section-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-radius:var(--radius);
    margin-bottom:12px; background:var(--bg-card); border:1px solid var(--border);
  }
  .stage-section-title { font-size:13px; font-weight:600; color:var(--text); }
  .stage-progress { font-size:11px; color:var(--text-muted); }
  .criteria-list { display:flex; flex-direction:column; gap:8px; }
  .criterion-item {
    display:flex; gap:10px; padding:8px 12px;
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius); align-items:flex-start;
  }
  .criterion-checkbox { width:18px; height:18px; min-width:18px; accent-color:var(--accent); margin-top:1px; cursor:pointer; }
  .criterion-content { flex:1; }
  .criterion-text { font-size:12px; font-weight:500; color:var(--text); margin-bottom:2px; }
  .criterion-desc { font-size:11px; color:var(--text-dim); margin-bottom:4px; }
  .criterion-badge { font-size:9px; padding:2px 6px; border-radius:3px; font-weight:600; text-transform:uppercase; background:var(--red-bg); color:var(--red); display:inline-block; }

  /* WATERFALL */
  .waterfall-container { display:flex; flex-direction:column; gap:32px; margin-top:20px; }
  .waterfall-stages { display:grid; grid-template-columns:repeat(6,1fr); gap:16px; margin-bottom:32px; }
  .waterfall-node {
    padding:16px 12px; border-radius:var(--radius);
    border:2px solid var(--border);
    background:var(--bg-card);
    text-align:center;
    transition:all 0.2s;
  }
  .waterfall-node.current { border-color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
  .waterfall-node.past { border-color:var(--teal); background:rgba(55,165,132,0.08); }
  .waterfall-node.future { opacity:0.5; }
  .waterfall-stage-name { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text); margin-bottom:8px; }
  .waterfall-days { font-size:20px; font-weight:700; color:var(--accent); margin-bottom:4px; font-variant-numeric:tabular-nums; }
  .waterfall-dates { font-size:9px; color:var(--text-muted); }

  .waterfall-summary {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px; padding:20px; background:var(--bg-card);
    border:1px solid var(--border); border-radius:var(--radius);
  }
  .summary-item { }
  .summary-label { font-size:10px; font-weight:600; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
  .summary-value { font-size:16px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }

  /* REVENUE TAB */
  .revenue-wrapper { padding:24px 32px; min-height:calc(100vh - 60px); }
  .revenue-header-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  .rev-stat { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 20px; position:relative; overflow:hidden; }
  .rev-stat::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .rev-stat:nth-child(1)::before { background:#37A584; }
  .rev-stat:nth-child(2)::before { background:#8B6CC1; }
  .rev-stat:nth-child(3)::before { background:#F5A623; }
  .rev-stat:nth-child(4)::before { background:#6D7287; }
  .rev-stat-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); margin-bottom:6px; }
  .rev-stat-value { font-size:24px; font-weight:700; letter-spacing:-0.5px; font-variant-numeric:tabular-nums; }
  .rev-stat-sub { font-size:11px; color:var(--text-dim); margin-top:4px; }

  .revenue-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
  @media (max-width:1100px) { .revenue-grid { grid-template-columns:1fr; } }

  .rev-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
  .rev-section-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .rev-section-title { font-size:13px; font-weight:700; color:var(--text); }
  .rev-section-badge { font-size:10px; padding:3px 8px; border-radius:4px; font-weight:600; }
  .rev-section-body { padding:16px 20px; }

  .priority-action-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid rgba(60,60,60,0.4); align-items:flex-start; }
  .priority-action-item:last-child { border-bottom:none; }
  .priority-dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .priority-dot.critical { background:var(--red); }
  .priority-dot.high { background:var(--orange); }
  .priority-dot.medium { background:var(--accent); }
  .priority-action-content { flex:1; }
  .priority-action-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:2px; }
  .priority-action-meta { font-size:11px; color:var(--text-dim); }
  .priority-action-deal { font-size:10px; color:var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:0.3px; margin-bottom:4px; }

  .split-col { display:flex; flex-direction:column; gap:8px; }
  .split-col-header { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); padding:4px 0 8px; display:flex; justify-content:space-between; }
  .split-deal-row { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--bg-surface); border-radius:var(--radius); cursor:pointer; transition:background 0.15s; }
  .split-deal-row:hover { background:var(--bg-card-hover); }
  .split-deal-name { font-size:13px; font-weight:500; color:var(--text); }
  .split-deal-value { font-size:12px; font-weight:600; color:var(--accent); font-variant-numeric:tabular-nums; }
  .split-deal-stage { font-size:9px; padding:2px 6px; border-radius:3px; font-weight:600; color:white; text-transform:uppercase; }

  .pathway-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
  .pathway-deal { border-bottom:1px solid var(--border); }
  .pathway-deal:last-child { border-bottom:none; }
  .pathway-deal-header { padding:14px 20px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:background 0.15s; }
  .pathway-deal-header:hover { background:var(--bg-card-hover); }
  .pathway-deal-left { display:flex; align-items:center; gap:12px; }
  .pathway-deal-name { font-size:14px; font-weight:600; color:var(--text); }
  .pathway-deal-right { display:flex; align-items:center; gap:12px; }
  .pathway-deal-value { font-size:14px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }
  .pathway-steps-list { padding:0 20px 16px; }
  .pathway-step { display:flex; gap:12px; padding:8px 0; align-items:flex-start; }
  .pathway-step-num { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
  .pathway-step-num.done { background:var(--accent); color:white; }
  .pathway-step-num.pending { background:var(--bg-surface); color:var(--text-dim); border:1px solid var(--border); }
  .pathway-step-content { flex:1; }
  .pathway-step-title { font-size:12px; font-weight:500; color:var(--text); }
  .pathway-step-owner { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .pathway-step-due { font-size:10px; color:var(--text-muted); }

  .rev-empty { padding:24px; text-align:center; color:var(--text-muted); font-size:12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const SUPABASE_URL = 'https://wrhzavqvbfeqhldpqcgl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyaHphdnF2YmZlcWhsZHBxY2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzYzNTEsImV4cCI6MjA5MDM1MjM1MX0.eIduMPLm8_6lbY_GzGRBEPJ-hifuXjWjp6Kvva6EAHU';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STAGES = [
  { key:'intro', label:'Intro', color:'var(--stage-intro)', order:1 },
  { key:'discovery', label:'Discovery', color:'var(--stage-discovery)', order:2 },
  { key:'poc', label:'POC', color:'var(--stage-poc)', order:3 },
  { key:'proposal', label:'Proposal', color:'var(--stage-proposal)', order:4 },
  { key:'procurement', label:'Procurement', color:'var(--stage-procurement)', order:5 },
  { key:'contract_signed', label:'Signed', color:'var(--stage-signed)', order:6 },
];

const STAGE_MAP = Object.fromEntries(STAGES.map(s => [s.key, s]));

// Control Room stage → Conquer Intel stage mapping
const CR_TO_INTEL_STAGE = {
  intro: 'introduction',
  discovery: 'discovery',
  poc: 'discovery',
  proposal: 'proposal',
  procurement: 'proposal',
  contract_signed: 'active'
};

const STAGE_BENCHMARKS = {
  intro: 7,
  discovery: 14,
  poc: 30,
  proposal: 14,
  procurement: 21,
  contract_signed: 0,
};

const WEIGHT_MAP = {
  intro: 0.05,
  discovery: 0.15,
  poc: 0.3,
  proposal: 0.5,
  procurement: 0.75,
  contract_signed: 1,
};

function fmt(val, note) {
  if (!val && note) return note;
  if (!val) return 'TBC';
  if (val >= 1000000) return `\u00A3${(val/1000000).toFixed(1)}M`;
  if (val >= 1000) return `\u00A3${(val/1000).toFixed(0)}K`;
  return `\u00A3${val}`;
}

function daysUntil(d) {
  if (!d) return null;
  const dt = new Date(d), now = new Date();
  now.setHours(0,0,0,0); dt.setHours(0,0,0,0);
  return Math.round((dt - now) / 86400000);
}

function initials(name) {
  return name ? name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : '?';
}

function OverviewTab({ deal, teamMembers, onEditDeal }) {
  const [activities, setActivities] = useState([]);
  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);

  useEffect(() => {
    const fetchActivities = async () => {
      const { data } = await supabase.from('deal_activity_log').select('*').eq('deal_id', deal.id).order('logged_at', { ascending: false });
      if (data) setActivities(data);
    };
    fetchActivities();
  }, [deal.id]);

  const stageInfo = STAGE_MAP[deal.stage];
  const dealOwner = tmMap[deal.deal_owner_id];
  const nextActionOwner = tmMap[deal.next_action_owner_id];

  const dueD = deal.next_action_due ? daysUntil(deal.next_action_due) : null;
  const dueClass = dueD !== null ? (dueD < 0 ? 'hero-due-overdue' : dueD <= 2 ? 'hero-due-soon' : 'hero-due-ok') : '';
  const dueLabel = dueD !== null ? (dueD < 0 ? Math.abs(dueD) + 'd overdue' : dueD === 0 ? 'Due today' : 'Due in ' + dueD + 'd') : null;

  const fv = (v) => v || null;

  // Compute engagement metrics
  const lastActivityDate = deal.last_activity_date ? new Date(deal.last_activity_date) : null;
  const daysSinceTouch = lastActivityDate ? Math.floor((new Date() - lastActivityDate) / (1000*60*60*24)) : null;
  const engagementTrend = daysSinceTouch === null ? '—' : daysSinceTouch < 7 ? '↑ Active' : daysSinceTouch < 14 ? '→ Steady' : '↓ Cooling';
  const engagementColor = daysSinceTouch === null ? 'var(--text-muted)' : daysSinceTouch < 7 ? 'var(--accent)' : daysSinceTouch < 14 ? 'var(--text-muted)' : 'var(--red)';

  // Compute timing metrics
  const createdDate = deal.created_date ? new Date(deal.created_date) : null;
  const stageEnteredDate = deal.stage_entered_date ? new Date(deal.stage_entered_date) : null;
  const daysInStage = stageEnteredDate ? Math.floor((new Date() - stageEnteredDate) / (1000*60*60*24)) : null;
  const dealAge = createdDate ? Math.floor((new Date() - createdDate) / (1000*60*60*24)) : null;
  const daysAgoStr = (date) => {
    if (!date) return null;
    const days = Math.floor((new Date() - new Date(date)) / (1000*60*60*24));
    return days === 0 ? 'today' : days === 1 ? '1 day ago' : days + ' days ago';
  };

  // Compute qualification score
  const qualItems = [
    { key: 'pain_validated', label: 'Pain Validated' },
    { key: 'budget_identified', label: 'Budget Identified' },
    { key: 'decision_maker_access', label: 'DM Access' },
    { key: 'compelling_event', label: 'Compelling Event' },
    { key: 'competition_known', label: 'Competition Known' }
  ];
  const healthScore = qualItems.filter(q => deal[q.key] === true).length;
  const healthBadge = healthScore >= 4 ? { label: 'Strong', color: 'var(--accent)' } : healthScore >= 2 ? { label: 'Medium', color: 'var(--orange)' } : { label: 'Weak', color: 'var(--red)' };

  // Weighted value
  const weightedValue = deal.deal_value && deal.close_probability ? fmt(Math.round(deal.deal_value * deal.close_probability / 100)) : null;

  return (
    <div>
      {/* HERO: Next Action + Enhanced Value */}
      <div className="overview-hero">
        <div className="hero-card" style={dueD !== null && dueD < 0 ? {borderColor:'var(--red)',borderWidth:1} : {}}>
          <div className="hero-card-label">Next Action</div>
          <div className="hero-card-action">{deal.next_action || <span style={{color:'var(--text-muted)',fontStyle:'italic'}}>No action set</span>}</div>
          <div className="hero-card-meta">
            {nextActionOwner ? <span>{nextActionOwner.display_name}</span> : dealOwner ? <span>{dealOwner.display_name}</span> : null}
            {dueLabel && <span className={'hero-due-badge ' + dueClass}>{dueLabel}</span>}
          </div>
        </div>
        <div className="hero-card">
          <div className="hero-card-label">Deal Value</div>
          <div className="hero-value">{deal.deal_value ? fmt(deal.deal_value) : <span style={{color:'var(--text-muted)',fontSize:16,fontWeight:400,fontStyle:'italic'}}>Not set</span>}</div>
          <div className="hero-value-sub">
            {weightedValue && <span style={{fontSize:12,color:'var(--text-muted)',marginRight:12}}>Weighted: {weightedValue}</span>}
            {deal.close_probability !== undefined && <span style={{fontSize:10,background:'var(--bg-secondary)',padding:'2px 8px',borderRadius:'var(--radius)',marginRight:8}}>{deal.close_probability}%</span>}
            {deal.contract_basis && <span style={{fontSize:10,background:'var(--bg-secondary)',padding:'2px 8px',borderRadius:'var(--radius)'}}>{deal.contract_basis}</span>}
          </div>
        </div>
      </div>

      {/* STALL REASON prominent if present */}
      {deal.status === 'stalled' && (
        <div style={{background:'var(--red-bg)',border:'1px solid rgba(236,53,64,0.2)',borderRadius:'var(--radius-lg)',padding:'14px 20px',marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'var(--red)',marginBottom:6}}>Stall Reason</div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.5}}>{deal.stall_reason || <span style={{color:'var(--text-muted)',fontStyle:'italic'}}>No reason provided</span>}</div>
        </div>
      )}

      {/* ENGAGEMENT PULSE */}
      <div className="pulse-bar">
        <div className="pulse-item">
          <div className="pulse-value">{deal.meeting_count || 0}</div>
          <div className="pulse-label">Meetings</div>
        </div>
        <div className="pulse-item">
          <div className="pulse-value">{deal.email_count || 0}</div>
          <div className="pulse-label">Emails</div>
        </div>
        <div className="pulse-item">
          <div className="pulse-value">{daysSinceTouch !== null ? daysSinceTouch : '—'}</div>
          <div className="pulse-label">Days Since Touch</div>
        </div>
        <div className="pulse-item">
          <div className="pulse-value" style={{color:engagementColor}}>{engagementTrend}</div>
          <div className="pulse-label">Engagement Trend</div>
        </div>
      </div>

      {/* DEAL TIMING */}
      <div className="timing-bar">
        <div className="timing-item">
          <div className="timing-value">{createdDate ? createdDate.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—'}</div>
          <div className="timing-label">Created {daysAgoStr(deal.created_date)}</div>
        </div>
        <div className="timing-item">
          <div className="timing-value">{daysInStage !== null ? daysInStage : '—'}</div>
          <div className="timing-label">Days in Stage</div>
        </div>
        <div className="timing-item">
          <div className="timing-value">{deal.expected_close_date ? new Date(deal.expected_close_date).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}) : <span style={{fontStyle:'italic'}}>Not set</span>}</div>
          <div className="timing-label">Expected Close</div>
        </div>
        <div className="timing-item">
          <div className="timing-value">{dealAge !== null ? dealAge : '—'}</div>
          <div className="timing-label">Deal Age (days)</div>
        </div>
      </div>

      {/* QUALIFICATION SCORECARD */}
      <div className="qual-card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>Qualification</div>
          <div style={{fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:'var(--radius)',background:healthBadge.color+'15',color:healthBadge.color,textTransform:'uppercase',letterSpacing:0.5}}>{healthBadge.label} ({healthScore}/5)</div>
        </div>

function TasksTab({ deal, teamMembers }) {
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [newTask, setNewTask] = useState({title:'',description:'',owner_id:'',due_date:'',priority:'medium'});
  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);

  useEffect(() => {
    const fetchTasks = async () => {
      setLoading(true);
      const { data } = await supabase.from('deal_actions').select('*').eq('deal_id', deal.id).order('due_date',{ascending:true});
      if (data) setTasks(data);
      setLoading(false);
    };
    fetchTasks();
  }, [deal.id]);

  useEffect(() => {
    const ch = supabase.channel(`tasks-${deal.id}`)
      .on('postgres_changes', { event:'*', schema:'public', table:'deal_actions', filter:`deal_id=eq.${deal.id}` }, p => {
        if (p.eventType === 'UPDATE') setTasks(prev => prev.map(t => t.id === p.new.id ? p.new : t));
        else if (p.eventType === 'INSERT') setTasks(prev => [...prev, p.new]);
      }).subscribe();
    return () => supabase.removeChannel(ch);
  }, [deal.id]);

  const handleToggleTask = async (task) => {
    const statuses = ['pending', 'in_progress', 'completed'];
    const curr = statuses.indexOf(task.status || 'pending');
    const next = statuses[(curr + 1) % statuses.length];
    const updates = { status: next };
    if (next === 'completed') updates.completed_at = new Date().toISOString();
    const { error } = await supabase.from('deal_actions').update(updates).eq('id', task.id);
    if (!error) setTasks(prev => prev.map(t => t.id === task.id ? { ...t, ...updates } : t));
  };

  const handleAddTask = async () => {
    if (!newTask.title.trim()) return;
    const payload = {
      deal_id: deal.id,
      title: newTask.title,
      description: newTask.description || null,
      owner_id: newTask.owner_id || deal.deal_owner_id,
      due_date: newTask.due_date || new Date(Date.now() + 7*86400000).toISOString().split('T')[0],
      priority: newTask.priority,
      status: 'pending',
    };
    const { data, error } = await supabase.from('deal_actions').insert(payload).select();
    if (!error && data) {
      setTasks(prev => [...prev, data[0]]);
      setNewTask({title:'',description:'',owner_id:'',due_date:'',priority:'medium'});
      setShowAdd(false);
    }
  };

  const getPriorityClass = (p) => {
    if (!p) return 'badge-medium';
    if (p === 'low') return 'badge-low';
    if (p === 'medium') return 'badge-medium';
    return 'badge-high';
  };

  const statusLabel = (s) => s === 'in_progress' ? 'In Progress' : s === 'completed' ? 'Done' : 'Pending';

  if (loading) return <div style={{color:'var(--text-muted)',fontSize:12}}>Loading tasks\u2026</div>;

  const pending = tasks.filter(t => t.status !== 'completed');
  const completed = tasks.filter(t => t.status === 'completed');

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:12,color:'var(--text-muted)'}}>{pending.length} open · {completed.length} completed</div>
        <button className="btn btn-primary" style={{fontSize:12,padding:'6px 14px'}} onClick={() => setShowAdd(!showAdd)}>+ Add Task</button>
      </div>

      {showAdd && (
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:16,marginBottom:16}}>
          <div className="edit-row"><div className="edit-label">Title</div><input className="edit-field" value={newTask.title} onChange={e=>setNewTask({...newTask,title:e.target.value})} placeholder="Task title"/></div>
          <div className="edit-row"><div className="edit-label">Description</div><textarea className="edit-field" value={newTask.description} onChange={e=>setNewTask({...newTask,description:e.target.value})} rows={2} placeholder="Optional details"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
            <div className="edit-row"><div className="edit-label">Owner</div><select className="edit-field" value={newTask.owner_id} onChange={e=>setNewTask({...newTask,owner_id:e.target.value})}><option value="">Default</option>{teamMembers.map(t=><option key={t.id} value={t.id}>{t.display_name}</option>)}</select></div>
            <div className="edit-row"><div className="edit-label">Due Date</div><input className="edit-field" type="date" value={newTask.due_date} onChange={e=>setNewTask({...newTask,due_date:e.target.value})}/></div>
            <div className="edit-row"><div className="edit-label">Priority</div><select className="edit-field" value={newTask.priority} onChange={e=>setNewTask({...newTask,priority:e.target.value})}><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="critical">Critical</option></select></div>
          </div>
          <div className="btn-row"><button className="btn btn-primary" onClick={handleAddTask}>Save Task</button><button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Cancel</button></div>
        </div>
      )}

      <div className="tasks-list">
        {pending.length === 0 && completed.length === 0 && <div style={{fontSize:12,color:'var(--text-muted)',padding:'12px 0'}}>No tasks yet — add one above</div>}
        {pending.map(task => {
          const isOverdue = task.due_date && daysUntil(task.due_date) < 0 && task.status !== 'completed';
          const owner = tmMap[task.owner_id];
          return (
            <div key={task.id} className="task-item" style={isOverdue?{borderLeftColor:'var(--orange)'}:{}}>
              <div style={{cursor:'pointer',flexShrink:0}} onClick={() => handleToggleTask(task)}>
                <div style={{width:18,height:18,borderRadius:'50%',border:task.status==='in_progress'?'2px solid var(--accent)':'2px solid var(--border)',background:task.status==='in_progress'?'var(--accent-subtle)':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {task.status==='in_progress' && <div style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)'}}></div>}
                </div>
              </div>
              <div className="task-details">
                <div className="task-title">{task.title}</div>
                {task.description && <div className="task-description">{task.description}</div>}
                <div className="task-meta">
                  {task.intel_action_id && <span className="task-badge" style={{background:'var(--teal-bg)',color:'var(--teal)'}}>Intel</span>}
                  {!task.intel_action_id && <span className="task-badge" style={{background:'var(--blue-bg)',color:'var(--blue)'}}>Manual</span>}
                  <span className={`task-badge ${getPriorityClass(task.priority)}`}>{task.priority||'medium'}</span>
                  <span className="task-badge" style={{background:'transparent',color:task.status==='in_progress'?'var(--accent)':'var(--text-muted)'}}>{statusLabel(task.status)}</span>
                  {owner && <span style={{fontSize:11,color:'var(--text-muted)'}}>{owner.display_name}</span>}
                  {task.due_date && <span style={{fontSize:11,color:isOverdue?'var(--orange)':'var(--text-muted)'}}>{isOverdue?'\u26A0 ':''}{new Date(task.due_date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>}
                </div>
              </div>
            </div>
          );
        })}
        {completed.length > 0 && (
          <>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',color:'var(--text-muted)',padding:'16px 0 8px',borderTop:'1px solid var(--border)',marginTop:8}}>Completed ({completed.length})</div>
            {completed.map(task => {
              const owner = tmMap[task.owner_id];
              return (
                <div key={task.id} className="task-item" style={{opacity:0.5}}>
                  <div style={{cursor:'pointer',flexShrink:0}} onClick={() => handleToggleTask(task)}>
                    <div style={{width:18,height:18,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <span style={{color:'white',fontSize:10,fontWeight:700}}>✓</span>
                    </div>
                  </div>
                  <div className="task-details">
                    <div className="task-title" style={{textDecoration:'line-through',color:'var(--text-dim)'}}>{task.title}</div>
                    <div className="task-meta">
                      {owner && <span style={{fontSize:11,color:'var(--text-muted)'}}>{owner.display_name}</span>}
                      {task.completed_at && <span style={{fontSize:11,color:'var(--text-muted)'}}>Done {new Date(task.completed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

function GameplanTab({ deal }) {
  const [criteria, setCriteria] = useState([]);
  const [checks, setChecks] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    const fetch = async () => {
      setLoading(true);
      const [c, ch] = await Promise.all([
        supabase.from('gate_criteria').select('*').order('sort_order'),
        supabase.from('deal_gate_checks').select('*').eq('deal_id', deal.id),
      ]);
      if (c.data) setCriteria(c.data);
      if (ch.data) setChecks(ch.data);
      setLoading(false);
    };
    fetch();
  }, [deal.id]);

  const handleToggleCriterion = async (crits) => {
    const isMet = checks.some(c => c.gate_criterion_id === crits.id && c.is_met);
    const { error } = await supabase.from('deal_gate_checks').upsert({
      deal_id: deal.id,
      gate_criterion_id: crits.id,
      is_met: !isMet,
    }, { onConflict: 'deal_id,gate_criterion_id' });
    if (!error) {
      setChecks(prev => {
        const ex = prev.findIndex(c => c.gate_criterion_id === crits.id);
        if (ex >= 0) return [...prev.slice(0, ex), { ...prev[ex], is_met: !isMet }, ...prev.slice(ex + 1)];
        return [...prev, { deal_id: deal.id, gate_criterion_id: crits.id, is_met: !isMet }];
      });
    }
  };

  const stageIdx = STAGES.findIndex(s => s.key === deal.stage);
  const byStage = useMemo(() => {
    const g = {};
    STAGES.forEach(s => g[s.key] = []);
    criteria.forEach(c => {
      if (g[c.stage]) g[c.stage].push(c);
    });
    return g;
  }, [criteria]);

  if (loading) return <div style={{color:'var(--text-muted)',fontSize:12}}>Loading gameplan…</div>;

  return (
    <div className="gameplan-container">
      {STAGES.map((stage, idx) => {
        const stageCrit = byStage[stage.key] || [];
        if (stageCrit.length === 0) return null;
        const metCount = stageCrit.filter(c => checks.some(ch => ch.gate_criterion_id === c.id && ch.is_met)).length;
        const isPast = idx < stageIdx;
        const isCurrent = idx === stageIdx;
        return (
          <div key={stage.key} className="stage-section">
            <div className="stage-section-header" style={{borderColor:isPast?'var(--teal)':isCurrent?'var(--accent)':'var(--border)',borderWidth:'2px'}}>
              <span className="stage-section-title" style={{color:isPast?'var(--teal)':isCurrent?'var(--accent)':'var(--text)'}}>{stage.label}</span>
              <span className="stage-progress">{metCount}/{stageCrit.length}</span>
            </div>
            <div className="criteria-list">
              {stageCrit.map(c => {
                const isMet = checks.some(ch => ch.gate_criterion_id === c.id && ch.is_met);
                return (
                  <div key={c.id} className="criterion-item">
                    <input type="checkbox" className="criterion-checkbox" checked={isMet} onChange={() => handleToggleCriterion(c)} />
                    <div className="criterion-content">
                      <div className="criterion-text">{c.criterion}</div>
                      {c.description && <div className="criterion-desc">{c.description}</div>}
                      {c.is_required && <span className="criterion-badge">Required</span>}
                    </div>
                  </div>
                );
              })}
            </div>
            {isCurrent && stageCrit.every(c => !c.is_required || checks.some(ch => ch.gate_criterion_id === c.id && ch.is_met)) && (
              <div style={{padding:'12px',background:'var(--accent-subtle)',border:'1px solid var(--accent)',borderRadius:'var(--radius)',color:'var(--accent)',fontSize:12,fontWeight:600,marginTop:'8px'}}>→ Ready to Advance</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function RouteToCashTab({ deal }) {
  const stageIdx = STAGES.findIndex(s => s.key === deal.stage);
  const daysInCurrent = deal.stage_entered_at ? Math.floor((Date.now() - new Date(deal.stage_entered_at)) / 86400000) : 0;

  const projectedClose = useMemo(() => {
    let d = new Date();
    for (let i = stageIdx + 1; i < STAGES.length; i++) {
      d = new Date(d.getTime() + STAGE_BENCHMARKS[STAGES[i].key] * 86400000);
    }
    return d.toLocaleDateString('en-GB');
  }, [stageIdx]);

  return (
    <div className="waterfall-container">
      <div className="waterfall-stages">
        {STAGES.map((stage, idx) => {
          const isP = idx < stageIdx;
          const isC = idx === stageIdx;
          return (
            <div key={stage.key} className={`waterfall-node ${isP?'past':isC?'current':'future'}`}>
              <div className="waterfall-stage-name">{stage.label}</div>
              <div className="waterfall-days">{isP || isC ? (isC ? daysInCurrent : '—') : STAGE_BENCHMARKS[stage.key]}</div>
              <div className="waterfall-dates" style={{opacity:isP||isC?1:0.5}}>{isC?'Current':isP?'Past':'Est.'}</div>
            </div>
          );
        })}
      </div>

      <div className="waterfall-summary">
        <div className="summary-item">
          <div className="summary-label">Deal Value</div>
          <div className="summary-value">{fmt(deal.deal_value, deal.deal_value_note)}</div>
        </div>
        <div className="summary-item">
          <div className="summary-label">Weighted Value</div>
          <div className="summary-value">{fmt(deal.deal_value * WEIGHT_MAP[deal.stage])}</div>
        </div>
        <div className="summary-item">
          <div className="summary-label">Days in Pipeline</div>
          <div className="summary-value">{deal.stage_entered_at ? daysInCurrent : '—'}</div>
        </div>
        <div className="summary-item">
          <div className="summary-label">Projected Close</div>
          <div className="summary-value">{projectedClose}</div>
        </div>
      </div>
    </div>
  );
}

function PriorityActionsBoard({ deals, teamMembers }) {
  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);

  // Priority deals: in proposal/procurement/poc stages, active, sorted by value
  const priorityDeals = useMemo(() => {
    return deals
      .filter(d => ['proposal', 'procurement', 'poc'].includes(d.stage) && d.status === 'active')
      .sort((a, b) => (b.deal_value || 0) - (a.deal_value || 0));
  }, [deals]);

  // Build flat action list from priority deals
  const actions = useMemo(() => {
    return priorityDeals.map(d => ({
      dealId: d.id,
      account: d.account_name,
      project: d.project_name,
      action: d.next_action,
      due: d.next_action_due,
      ownerId: d.next_action_owner_id || d.deal_owner_id,
      stage: d.stage,
      value: d.deal_value,
      isOverdue: d.next_action_due && daysUntil(d.next_action_due) < 0,
      daysOut: d.next_action_due ? daysUntil(d.next_action_due) : null,
    })).filter(a => a.action);
  }, [priorityDeals]);

  const getPriorityLevel = (a) => {
    if (a.isOverdue) return 'critical';
    if (a.stage === 'procurement') return 'critical';
    if (a.stage === 'proposal') return 'high';
    return 'medium';
  };

  return (
    <div className="rev-section" style={{gridColumn:'1 / -1'}}>
      <div className="rev-section-header">
        <span className="rev-section-title">Priority Actions — Path to Revenue</span>
        <span className="rev-section-badge" style={{background:'var(--red-bg)',color:'var(--red)'}}>{actions.length} actions</span>
      </div>
      <div className="rev-section-body">
        {actions.length === 0 && <div className="rev-empty">No priority actions right now</div>}
        {actions.map((a, i) => {
          const owner = tmMap[a.ownerId];
          const prio = getPriorityLevel(a);
          return (
            <div key={i} className="priority-action-item">
              <div className={`priority-dot ${prio}`}></div>
              <div className="priority-action-content">
                <div className="priority-action-deal">{a.account} — {STAGE_MAP[a.stage]?.label}</div>
                <div className="priority-action-title">{a.action}</div>
                <div className="priority-action-meta">
                  {owner ? owner.display_name : 'Unassigned'}
                  {a.due && <span> · {a.isOverdue ? <span style={{color:'var(--orange)',fontWeight:600}}>{Math.abs(a.daysOut)}d overdue</span> : `Due in ${a.daysOut}d`}</span>}
                  <span> · {fmt(a.value)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PathwayToInvoice({ deals, teamMembers, onDealClick }) {
  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);
  const [expanded, setExpanded] = useState({});

  // Focus on deals closest to money: proposal, procurement stages
  const invoiceDeals = useMemo(() => {
    return deals
      .filter(d => ['proposal', 'procurement', 'poc'].includes(d.stage) && d.status === 'active')
      .sort((a, b) => {
        const stageOrder = { procurement: 0, proposal: 1, poc: 2 };
        const so = (stageOrder[a.stage] || 9) - (stageOrder[b.stage] || 9);
        return so !== 0 ? so : (b.deal_value || 0) - (a.deal_value || 0);
      });
  }, [deals]);

  const toggleExpand = (id) => setExpanded(prev => ({...prev, [id]: !prev[id]}));

  // Generate default pathway steps if none stored
  const getSteps = (deal) => {
    if (deal.pathway_steps && Array.isArray(deal.pathway_steps) && deal.pathway_steps.length > 0) {
      return deal.pathway_steps;
    }
    // Default pathway based on stage
    const defaults = {
      poc: [
        { step: 'Complete POC delivery', done: false },
        { step: 'Get stakeholder sign-off on POC results', done: false },
        { step: 'Submit commercial proposal', done: false },
        { step: 'Navigate procurement', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
      proposal: [
        { step: 'Proposal submitted and reviewed', done: false },
        { step: 'Commercial terms agreed', done: false },
        { step: 'Navigate procurement / legal', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
      procurement: [
        { step: 'Legal / procurement review complete', done: false },
        { step: 'Final sign-off from decision maker', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
    };
    return defaults[deal.stage] || [{ step: 'Move to next stage', done: false }];
  };

  return (
    <div className="pathway-section">
      <div className="rev-section-header" style={{borderBottom:'1px solid var(--border)'}}>
        <span className="rev-section-title">Pathway to Invoice</span>
        <span className="rev-section-badge" style={{background:'var(--accent-subtle)',color:'var(--accent)'}}>{invoiceDeals.length} deals in flight</span>
      </div>
      {invoiceDeals.length === 0 && <div className="rev-empty">No deals approaching invoice stage</div>}
      {invoiceDeals.map(d => {
        const steps = getSteps(d);
        const doneCount = steps.filter(s => s.done).length;
        const isOpen = expanded[d.id];
        return (
          <div key={d.id} className="pathway-deal">
            <div className="pathway-deal-header" onClick={() => toggleExpand(d.id)}>
              <div className="pathway-deal-left">
                <span style={{color:'var(--text-dim)',fontSize:12,fontWeight:600}}>{isOpen ? '▾' : '▸'}</span>
                <div>
                  <div className="pathway-deal-name">{d.account_name}</div>
                  <div style={{fontSize:11,color:'var(--text-dim)'}}>{d.project_name} · <span style={{color:STAGE_MAP[d.stage]?.color}}>{STAGE_MAP[d.stage]?.label}</span></div>
                </div>
              </div>
              <div className="pathway-deal-right">
                <span style={{fontSize:11,color:'var(--text-dim)'}}>{doneCount}/{steps.length} steps</span>
                <span className="pathway-deal-value">{fmt(d.deal_value)}</span>
              </div>
            </div>
            {isOpen && (
              <div className="pathway-steps-list">
                {steps.map((s, i) => {
                  const owner = s.owner_id ? tmMap[s.owner_id] : null;
                  return (
                    <div key={i} className="pathway-step">
                      <div className={`pathway-step-num ${s.done ? 'done' : 'pending'}`}>{s.done ? '✓' : i + 1}</div>
                      <div className="pathway-step-content">
                        <div className="pathway-step-title" style={s.done?{textDecoration:'line-through',color:'var(--text-dim)'}:{}}>{s.step}</div>
                        {owner && <div className="pathway-step-owner">{owner.display_name}</div>}
                        {s.due && <div className="pathway-step-due">Due: {new Date(s.due).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>}
                      </div>
                    </div>
                  );
                })}
                <div style={{textAlign:'right',marginTop:8}}>
                  <span style={{fontSize:10,color:'var(--text-muted)',cursor:'pointer'}} onClick={() => onDealClick && onDealClick(d.id)}>View full deal →</span>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function RevenueView({ deals, teamMembers, onDealClick }) {
  const activeDeals = useMemo(() => deals.filter(d => d.status === 'active'), [deals]);
  const closestToMoney = useMemo(() => activeDeals.filter(d => ['proposal','procurement'].includes(d.stage)), [activeDeals]);
  const totalPipeline = activeDeals.reduce((s, d) => s + (d.deal_value || 0), 0);
  const closeToMoneyVal = closestToMoney.reduce((s, d) => s + (d.deal_value || 0), 0);
  const weightedRev = activeDeals.reduce((s, d) => s + (d.deal_value || 0) * (WEIGHT_MAP[d.stage] || 0), 0);
  const overdueCount = activeDeals.filter(d => d.next_action_due && daysUntil(d.next_action_due) < 0).length;

  return (
    <div className="revenue-wrapper">

          <div className="rev-stat-value" style={{color:'var(--accent)'}}>{fmt(weightedRev)}</div>
          <div className="rev-stat-sub">Probability-adjusted</div>
        </div>
        <div className="rev-stat">
          <div className="rev-stat-label">Close to Money</div>
          <div className="rev-stat-value" style={{color:'var(--stage-procurement)'}}>{fmt(closeToMoneyVal)}</div>

        <div className="rev-stat">

        <div className="rev-stat">
          <div className="rev-stat-label">Total Pipeline</div>
          <div className="rev-stat-value" style={{color:'var(--blue)'}}>{fmt(totalPipeline)}</div>
          <div className="rev-stat-sub">{activeDeals.length} active deals</div>

      <div style={{marginTop:20}}>
        <PathwayToInvoice deals={deals} teamMembers={teamMembers} onDealClick={onDealClick} />

  );
