function PriorityActionsBoard({ deals, teamMembers }) {
  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);

  // Priority deals: in proposal/procurement/poc stages, active, sorted by value
  const priorityDeals = useMemo(() => {
    return deals
      .filter(d => ['proposal', 'procurement', 'poc'].includes(d.stage) && d.status === 'active')
      .sort((a, b) => (b.deal_value || 0) - (a.deal_value || 0));
  }, [deals]);

  // Build flat action list from priority deals
  const actions = useMemo(() => {
    return priorityDeals.map(d => ({
      dealId: d.id,
      account: d.account_name,
      project: d.project_name,
      action: d.next_action,
      due: d.next_action_due,
      ownerId: d.next_action_owner_id || d.deal_owner_id,
      stage: d.stage,
      value: d.deal_value,
      isOverdue: d.next_action_due && daysUntil(d.next_action_due) < 0,
      daysOut: d.next_action_due ? daysUntil(d.next_action_due) : null,
    })).filter(a => a.action);
  }, [priorityDeals]);

  const getPriorityLevel = (a) => {
    if (a.isOverdue) return 'critical';
    if (a.stage === 'procurement') return 'critical';
    if (a.stage === 'proposal') return 'high';
    return 'medium';
  };

  return (
    <div className="rev-section" style={{gridColumn:'1 / -1'}}>
      <div className="rev-section-header">
        <span className="rev-section-title">Priority Actions — Path to Revenue</span>
        <span className="rev-section-badge" style={{background:'var(--red-bg)',color:'var(--red)'}}>{actions.length} actions</span>
      </div>
      <div className="rev-section-body">
        {actions.length === 0 && <div className="rev-empty">No priority actions right now</div>}
        {actions.map((a, i) => {
          const owner = tmMap[a.ownerId];
          const prio = getPriorityLevel(a);
          return (
            <div key={i} className="priority-action-item">
              <div className={`priority-dot ${prio}`}></div>
              <div className="priority-action-content">
                <div className="priority-action-deal">{a.account} — {STAGE_MAP[a.stage]?.label}</div>
                <div className="priority-action-title">{a.action}</div>
                <div className="priority-action-meta">
                  {owner ? owner.display_name : 'Unassigned'}
                  {a.due && <span> · {a.isOverdue ? <span style={{color:'var(--orange)',fontWeight:600}}>{Math.abs(a.daysOut)}d overdue</span> : `Due in ${a.daysOut}d`}</span>}
                  <span> · {fmt(a.value)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AccountGrowthVsNewBusiness({ deals, teamMembers, onDealClick }) {

  const growth = useMemo(() => deals.filter(d => d.revenue_category === 'account_growth' && d.status === 'active').sort((a, b) => (b.deal_value || 0) - (a.deal_value || 0)), [deals]);

  const growthVal = growth.reduce((s, d) => s + (d.deal_value || 0), 0);

function PathwayToInvoice({ deals, teamMembers, onDealClick }) {
  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);
  const [expanded, setExpanded] = useState({});

  // Focus on deals closest to money: proposal, procurement stages
  const invoiceDeals = useMemo(() => {
    return deals
      .filter(d => ['proposal', 'procurement', 'poc'].includes(d.stage) && d.status === 'active')
      .sort((a, b) => {
        const stageOrder = { procurement: 0, proposal: 1, poc: 2 };
        const so = (stageOrder[a.stage] || 9) - (stageOrder[b.stage] || 9);
        return so !== 0 ? so : (b.deal_value || 0) - (a.deal_value || 0);
      });
  }, [deals]);

  const toggleExpand = (id) => setExpanded(prev => ({...prev, [id]: !prev[id]}));

  // Generate default pathway steps if none stored
  const getSteps = (deal) => {
    if (deal.pathway_steps && Array.isArray(deal.pathway_steps) && deal.pathway_steps.length > 0) {
      return deal.pathway_steps;
    }
    // Default pathway based on stage
    const defaults = {
      poc: [
        { step: 'Complete POC delivery', done: false },
        { step: 'Get stakeholder sign-off on POC results', done: false },
        { step: 'Submit commercial proposal', done: false },
        { step: 'Navigate procurement', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
      proposal: [
        { step: 'Proposal submitted and reviewed', done: false },
        { step: 'Commercial terms agreed', done: false },
        { step: 'Navigate procurement / legal', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
      procurement: [
        { step: 'Legal / procurement review complete', done: false },
        { step: 'Final sign-off from decision maker', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
    };
    return defaults[deal.stage] || [{ step: 'Move to next stage', done: false }];
  };

  return (
    <div className="pathway-section">
      <div className="rev-section-header" style={{borderBottom:'1px solid var(--border)'}}>
        <span className="rev-section-title">Pathway to Invoice</span>
        <span className="rev-section-badge" style={{background:'var(--accent-subtle)',color:'var(--accent)'}}>{invoiceDeals.length} deals in flight</span>
      </div>
      {invoiceDeals.length === 0 && <div className="rev-empty">No deals approaching invoice stage</div>}
      {invoiceDeals.map(d => {
        const steps = getSteps(d);
        const doneCount = steps.filter(s => s.done).length;
        const isOpen = expanded[d.id];
        return (
          <div key={d.id} className="pathway-deal">
            <div className="pathway-deal-header" onClick={() => toggleExpand(d.id)}>
              <div className="pathway-deal-left">
                <span style={{color:'var(--text-dim)',fontSize:12,fontWeight:600}}>{isOpen ? '▾' : '▸'}</span>
                <div>
                  <div className="pathway-deal-name">{d.account_name}</div>
                  <div style={{fontSize:11,color:'var(--text-dim)'}}>{d.project_name} · <span style={{color:STAGE_MAP[d.stage]?.color}}>{STAGE_MAP[d.stage]?.label}</span></div>
                </div>
              </div>
              <div className="pathway-deal-right">
                <span style={{fontSize:11,color:'var(--text-dim)'}}>{doneCount}/{steps.length} steps</span>
                <span className="pathway-deal-value">{fmt(d.deal_value)}</span>
              </div>
            </div>
            {isOpen && (
              <div className="pathway-steps-list">
                {steps.map((s, i) => {
                  const owner = s.owner_id ? tmMap[s.owner_id] : null;
                  return (
                    <div key={i} className="pathway-step">
                      <div className={`pathway-step-num ${s.done ? 'done' : 'pending'}`}>{s.done ? '✓' : i + 1}</div>
                      <div className="pathway-step-content">
                        <div className="pathway-step-title" style={s.done?{textDecoration:'line-through',color:'var(--text-dim)'}:{}}>{s.step}</div>
                        {owner && <div className="pathway-step-owner">{owner.display_name}</div>}
                        {s.due && <div className="pathway-step-due">Due: {new Date(s.due).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>}
                      </div>
                    </div>
                  );
                })}
                <div style={{textAlign:'right',marginTop:8}}>
                  <span style={{fontSize:10,color:'var(--text-muted)',cursor:'pointer'}} onClick={() => onDealClick && onDealClick(d.id)}>View full deal →</span>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function RevenueView({ deals, teamMembers, onDealClick }) {

  const closestToMoney = useMemo(() => activeDeals.filter(d => ['proposal','procurement'].includes(d.stage)), [activeDeals]);
  const totalPipeline = activeDeals.reduce((s, d) => s + (d.deal_value || 0), 0);
  const closeToMoneyVal = closestToMoney.reduce((s, d) => s + (d.deal_value || 0), 0);
  const weightedRev = activeDeals.reduce((s, d) => s + (d.deal_value || 0) * (WEIGHT_MAP[d.stage] || 0), 0);

        <div className="rev-stat">
          <div className="rev-stat-label">Close to Money</div>
          <div className="rev-stat-value" style={{color:'var(--stage-procurement)'}}>{fmt(closeToMoneyVal)}</div>

function ClientsView({ clients, deals, teamMembers, onDealClick }) {
  const [search, setSearch] = useState('');
  const [expanded, setExpanded] = useState(null);
  const [sortBy, setSortBy] = useState('name');

  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);

  const enriched = useMemo(() => clients.map(c => {
    const cDeals = deals.filter(d => d.client_id === c.id);
    const activeDeals = cDeals.filter(d => d.status === 'active');
    const totalValue = cDeals.reduce((s, d) => s + (d.deal_value || 0), 0);
    const weightedValue = cDeals.reduce((s, d) => s + (d.deal_value || 0) * ((d.close_probability || 0) / 100), 0);
    const latestActivity = cDeals.reduce((latest, d) => {
      if (!d.last_activity_date) return latest;
      return !latest || new Date(d.last_activity_date) > new Date(latest) ? d.last_activity_date : latest;
    }, null);
    const stages = [...new Set(cDeals.map(d => d.stage))];
    const furthestStage = STAGES.reduce((f, s) => cDeals.some(d => d.stage === s.key) ? s : f, null);
    return { ...c, deals: cDeals, activeDeals, totalValue, weightedValue, latestActivity, stages, furthestStage, dealCount: cDeals.length };
  }), [clients, deals]);

  const filtered = useMemo(() => {
    let list = enriched;
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(c => c.name.toLowerCase().includes(s) || (c.industry || '').toLowerCase().includes(s) || (c.region || '').toLowerCase().includes(s));
    }
    if (sortBy === 'name') list = [...list].sort((a, b) => a.name.localeCompare(b.name));
    else if (sortBy === 'value') list = [...list].sort((a, b) => b.totalValue - a.totalValue);
    else if (sortBy === 'deals') list = [...list].sort((a, b) => b.dealCount - a.dealCount);
    else if (sortBy === 'activity') list = [...list].sort((a, b) => (b.latestActivity || '') > (a.latestActivity || '') ? 1 : -1);
    return list;
  }, [enriched, search, sortBy]);

  const totalPipeline = enriched.reduce((s, c) => s + c.totalValue, 0);
  const totalWeighted = enriched.reduce((s, c) => s + c.weightedValue, 0);
  const multiOpp = enriched.filter(c => c.dealCount > 1).length;

  return (
    <div>
      {/* Stats */}
      <div className="stats-bar">
        <div className="stat-card">
          <div className="stat-label">Total Clients</div>
          <div className="stat-value" style={{color:'var(--accent)'}}>{clients.length}</div>
          <div className="stat-sub">{multiOpp} with multiple opportunities</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Total Pipeline</div>
          <div className="stat-value" style={{color:'var(--teal)'}}>{fmt(totalPipeline)}</div>
          <div className="stat-sub">Weighted: {fmt(Math.round(totalWeighted))}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Active Opportunities</div>
          <div className="stat-value" style={{color:'var(--stage-procurement)'}}>{deals.length}</div>
          <div className="stat-sub">Across {clients.length} clients</div>
        </div>
      </div>

      {/* Filters */}
      <div className="filter-bar">
        <input className="search-input" placeholder="Search clients…" value={search} onChange={e => setSearch(e.target.value)} />
        <div className="filter-sep"></div>
        <span style={{fontSize:11,color:'var(--text-muted)',marginRight:6}}>Sort:</span>
        {[{k:'name',l:'Name'},{k:'value',l:'Value'},{k:'deals',l:'Opportunities'},{k:'activity',l:'Last Activity'}].map(s => (
          <button key={s.k} className={`filter-chip ${sortBy===s.k?'active':''}`} onClick={() => setSortBy(s.k)}>{s.l}</button>
        ))}
      </div>

      {/* Client List */}
      <div style={{padding:'0 24px 40px'}}>
        {filtered.map(c => {
          const isExpanded = expanded === c.id;
          return (
            <div key={c.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',marginBottom:8,overflow:'hidden',transition:'all 0.15s'}}>
              {/* Client Row */}
              <div onClick={() => setExpanded(isExpanded ? null : c.id)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 20px',cursor:'pointer',transition:'background 0.1s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg-secondary)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div style={{display:'flex',alignItems:'center',gap:14,flex:1}}>
                  <div style={{width:36,height:36,borderRadius:'var(--radius)',background:c.furthestStage?.color || 'var(--bg-tertiary)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:13,fontWeight:700}}>{initials(c.name)}</div>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{c.name}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>
                      {c.industry && <span>{c.industry}</span>}

                </div>
                <div style={{display:'flex',alignItems:'center',gap:20}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:16,fontWeight:700,color:c.totalValue ? 'var(--text)' : 'var(--text-muted)'}}>{c.totalValue ? fmt(c.totalValue) : 'TBC'}</div>
                    <div style={{fontSize:9,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:0.5}}>Pipeline</div>
                  </div>
                  <div style={{textAlign:'center',minWidth:30}}>
                    <div style={{fontSize:16,fontWeight:700,color:c.dealCount > 1 ? 'var(--accent)' : 'var(--text-dim)'}}>{c.dealCount}</div>
                    <div style={{fontSize:9,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:0.5}}>{c.dealCount === 1 ? 'Opp' : 'Opps'}</div>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    {c.stages.map(stg => <span key={stg} className="stage-badge" style={{background:STAGE_MAP[stg]?.color,fontSize:9,padding:'2px 6px'}}>{STAGE_MAP[stg]?.label}</span>)}
                  </div>
                  <div style={{fontSize:18,color:'var(--text-muted)',transition:'transform 0.2s',transform:isExpanded?'rotate(180deg)':'rotate(0deg)'}}>▾</div>
                </div>
              </div>

              {/* Expanded: Opportunities */}
              {isExpanded && (
                <div style={{borderTop:'1px solid var(--border)',padding:'12px 20px 16px',background:'var(--bg-secondary)'}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:0.8,color:'var(--text-muted)',marginBottom:10}}>Opportunities</div>
                  {c.deals.map(d => {
                    const stageInfo = STAGE_MAP[d.stage];
                    const owner = tmMap[d.deal_owner_id];
                    const dueDays = daysUntil(d.next_action_due);
                    const isOverdue = dueDays !== null && dueDays < 0;
                    return (
                      <div key={d.id} onClick={() => onDealClick(d.id)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'var(--bg-card)',borderRadius:'var(--radius)',marginBottom:6,cursor:'pointer',border:'1px solid var(--border)',transition:'border-color 0.15s'}} onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{d.account_name !== c.name ? d.account_name + ' — ' : ''}{d.project_name || 'Untitled opportunity'}</div>
                          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>
                            {d.next_action && <span>› {d.next_action}</span>}
                          </div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <span style={{fontSize:12,fontWeight:600,color:d.deal_value?'var(--text)':'var(--text-muted)'}}>{d.deal_value ? fmt(d.deal_value) : 'TBC'}</span>
                          <span className="stage-badge" style={{background:stageInfo?.color}}>{stageInfo?.label}</span>
                          {d.status === 'stalled' && <span className="deal-tag tag-stalled">Stalled</span>}
                          {isOverdue && <span className="deal-tag tag-overdue">Overdue</span>}
                          {owner && <span style={{fontSize:10,color:'var(--text-muted)'}}>{owner.display_name}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AuditLogPanel({ onClose }) {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 30;

  const load = async (pg = 0) => {
    setLoading(true);
    const { data } = await supabase
      .from('audit_log')
      .select('*')
      .order('created_at', { ascending: false })
      .range(pg * PAGE_SIZE, pg * PAGE_SIZE + PAGE_SIZE - 1);
    if (data) setEntries(pg === 0 ? data : prev => [...prev, ...data]);
    setLoading(false);
  };

  useEffect(() => { load(0); }, []);

  const fmtTime = (ts) => {
    const d = new Date(ts);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  };

  const fieldLabel = (k) => ({ stage:'Stage', deal_value:'Value', status:'Status', next_action:'Next Action', next_action_due:'Due Date', champion_name:'Champion', deal_owner_id:'Owner', region:'Region', close_probability:'Probability', notes:'Notes' }[k] || k);

  return (
    <>
      <div className="overlay" onClick={onClose}></div>
      <div className="audit-panel">
        <div className="audit-panel-header">
          <div>
            <div className="audit-panel-title">Audit Log</div>
            <div className="audit-panel-sub">All deal changes by team members</div>
          </div>
          <button className="panel-close" onClick={onClose}>✕</button>
        </div>
        {loading && entries.length === 0 && <div className="audit-empty"><div className="loading-spinner"></div></div>}
        {!loading && entries.length === 0 && <div className="audit-empty"><div>No activity recorded yet</div><div style={{fontSize:10,color:'var(--text-muted)'}}>Changes will appear here</div></div>}
        {entries.map(e => {
          const changes = e.changes || {};
          const isStage = e.action === 'stage_change';
          const name = e.user_name || e.user_email;
          const av = initials(name);
          return (
            <div key={e.id} className="audit-entry">
              <div className="audit-entry-top">
                <div className="audit-entry-user">
                  <div className="audit-entry-avatar">
                    {e.user_avatar ? <img src={e.user_avatar} alt="" /> : av}
                  </div>
                  <span className="audit-entry-name">{name}</span>
                </div>
                <span className="audit-entry-time">{fmtTime(e.created_at)}</span>
              </div>
              <div className="audit-entry-deal">{e.entity_name}</div>
              <span className={`audit-action-label ${isStage ? 'audit-action-stage' : 'audit-action-edit'}`}>
                {isStage ? 'Stage Change' : 'Deal Edit'}
              </span>
              {Object.entries(changes).map(([k, v]) => (
                <div key={k} className="audit-change-row">
                  <span className="audit-change-field">{fieldLabel(k)}</span>
                  <span className="audit-change-from">{String(v.from ?? '—')}</span>
                  <span className="audit-change-arrow">→</span>
                  <span className="audit-change-to">{String(v.to ?? '—')}</span>
                </div>
              ))}
              {e.notes && <div className="audit-notes">"{e.notes}"</div>}
            </div>
          );
        })}
        {!loading && entries.length >= PAGE_SIZE && (
          <div className="audit-load-more">
            <button onClick={() => { const np = page + 1; setPage(np); load(np); }}>Load more</button>
          </div>
        )}
      </div>
    </>
  );
}

function App({ user }) {
  const [deals, setDeals] = useState([]);
  const [team, setTeam] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('board');
  const [view, setView] = useState('kanban');
  const [selId, setSelId] = useState(null);
  const [sel, setSel] = useState(null);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({});
  const [search, setSearch] = useState('');
  const [stageF, setStageF] = useState('all');
  const [regionF, setRegionF] = useState('all');
  const [friendlyF, setFriendlyF] = useState(false);
  const [statFilter, setStatFilter] = useState(null);
  const [toast, setToast] = useState(null);
  const [ts, setTs] = useState(new Date());
  const [auditOpen, setAuditOpen] = useState(false);

  const [clients, setClients] = useState([]);

  const load = useCallback(async () => {
    setLoading(true);
    const [d, t, c] = await Promise.all([
      supabase.from('deals').select('*').order('stage_entered_at', {ascending:false}),
      supabase.from('team_members').select('*'),
      supabase.from('clients').select('*').order('name'),
    ]);
    if (d.data) setDeals(d.data);
    if (t.data) setTeam(t.data);
    if (c.data) setClients(c.data);
    setLoading(false);
    setTs(new Date());
  }, []);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    const ch = supabase.channel('deals-rt')
      .on('postgres_changes', { event:'*', schema:'public', table:'deals' }, p => {
        if (p.eventType === 'UPDATE') setDeals(prev => prev.map(d => d.id === p.new.id ? p.new : d));
        else if (p.eventType === 'INSERT') setDeals(prev => [...prev, p.new]);
      }).subscribe();
    return () => supabase.removeChannel(ch);
  }, []);

  const tm = useMemo(() => Object.fromEntries(team.map(t => [t.id, t])), [team]);
  const cm = useMemo(() => Object.fromEntries(clients.map(c => [c.id, c])), [clients]);

  // Compute health for every deal once
  const healthMap = useMemo(() => {
    const map = {};
    deals.forEach(d => { map[d.id] = getDealHealth(d); });
    return map;
  }, [deals]);

  const filtered = useMemo(() => deals.filter(d => {
    // Stat card filters take priority
    if (statFilter === 'opportunities') { return d.status === 'active'; }
    if (statFilter === 'proposals') { return ['proposal','procurement'].includes(d.stage); }
    if (statFilter === 'closing30') {
      if (!d.expected_close_date) return false;
      const cd = new Date(d.expected_close_date);
      const now = new Date();
      return cd >= now && cd <= new Date(now.getTime() + 30 * 86400000);
    }
    if (statFilter === 'atRisk') {
      const h = healthMap[d.id];
      return h && (h.health === 'at_risk' || h.health === 'critical');
    }
    // Normal filters
    if (search) {
      const s = search.toLowerCase();
      const clientName = cm[d.client_id]?.name || '';
      if (!(d.account_name||'').toLowerCase().includes(s) && !(d.project_name||'').toLowerCase().includes(s) && !(d.champion_name||'').toLowerCase().includes(s) && !clientName.toLowerCase().includes(s)) return false;
    }
    if (stageF !== 'all' && d.stage !== stageF) return false;
    if (regionF !== 'all' && d.region !== regionF) return false;
    if (friendlyF && !d.is_friendly_client) return false;
    return true;
  }), [deals, search, stageF, regionF, friendlyF, statFilter, cm, healthMap]);

  const stats = useMemo(() => {
    const active = deals.filter(d => d.status === 'active');
    const val = active.reduce((s, d) => s + (d.deal_value || 0), 0);
    const w = active.reduce((s, d) => {
      const prob = d.close_probability || 0;
      return s + (d.deal_value || 0) * (prob / 100);
    }, 0);
    const preCommercial = deals.filter(d => ['intro','discovery','poc'].includes(d.stage));
    const commercial = deals.filter(d => ['proposal','procurement','contract_signed'].includes(d.stage));
    const preVal = preCommercial.reduce((s, d) => s + (d.deal_value || 0), 0);
    const comVal = commercial.reduce((s, d) => s + (d.deal_value || 0), 0);
    const proposals = deals.filter(d => ['proposal','procurement'].includes(d.stage));
    const proposalVal = proposals.reduce((s, d) => s + (d.deal_value || 0), 0);
    const now = new Date();
    const in30 = new Date(now.getTime() + 30 * 86400000);
    const closing30 = deals.filter(d => {
      if (!d.expected_close_date) return false;
      const cd = new Date(d.expected_close_date);
      return cd >= now && cd <= in30;
    });
    const closing30Val = closing30.reduce((s, d) => s + (d.deal_value || 0), 0);
    const closing30Weighted = closing30.reduce((s, d) => s + (d.deal_value || 0) * ((d.close_probability || 0) / 100), 0);
    // Use precomputed healthMap
    const atRiskDeals = deals.filter(d => { const h = healthMap[d.id]; return h && (h.health === 'at_risk' || h.health === 'critical'); });
    const criticalDeals = deals.filter(d => { const h = healthMap[d.id]; return h && h.health === 'critical'; });
    const watchDeals = deals.filter(d => { const h = healthMap[d.id]; return h && h.health === 'watch'; });
    const probDeals = commercial.filter(d => d.close_probability > 0);
    const avgProb = probDeals.length ? Math.round(probDeals.reduce((s,d) => s + d.close_probability, 0) / probDeals.length) : 0;
    return { total:deals.length, active:active.length, val, w, preCommercial:preCommercial.length, commercial:commercial.length, preVal, comVal, proposals:proposals.length, proposalVal, closing30:closing30.length, closing30Val, closing30Weighted, atRisk:atRiskDeals.length, critical:criticalDeals.length, watch:watchDeals.length, avgProb };
  }, [deals, healthMap]);

  const regions = useMemo(() => [...new Set(deals.map(d => d.region).filter(Boolean))].sort(), [deals]);

  const [dragId, setDragId] = useState(null);
  const [dragTarget, setDragTarget] = useState(null);
  const [dragNotes, setDragNotes] = useState('');

  const handleDrop = (targetStage) => {
    if (!dragId) return;
    const deal = deals.find(d => d.id === dragId);
    if (!deal || deal.stage === targetStage) { setDragId(null); return; }
    setDragTarget({ deal, targetStage });
    setDragNotes('');
    setDragId(null);
  };

  const confirmDrop = async () => {
    if (!dragTarget) return;
    const { deal, targetStage } = dragTarget;
    const now = new Date().toISOString();
    const updates = { stage: targetStage, stage_entered_at: now };
    if (dragNotes.trim()) updates.notes = (deal.notes ? deal.notes + '\n' : '') + `[${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'})}] Moved to ${STAGE_MAP[targetStage]?.label}: ${dragNotes.trim()}`;
    setDeals(prev => prev.map(d => d.id === deal.id ? {...d, ...updates} : d));
    setDragTarget(null);
    const { error } = await supabase.from('deals').update(updates).eq('id', deal.id);
    if (error) {
      setDeals(prev => prev.map(d => d.id === deal.id ? {...d, stage: deal.stage, stage_entered_at: deal.stage_entered_at, notes: deal.notes} : d));
      flash('Error moving deal: ' + error.message);
    } else {
      logAudit('stage_change', deal.id, deal.account_name, { stage: { from: deal.stage, to: targetStage } }, dragNotes.trim() || null);
      flash(`Moved ${deal.account_name} to ${STAGE_MAP[targetStage]?.label}${deal.intel_engagement_id ? ' — Intel sync queued' : ''}`);
    }
  };

  const cancelDrop = () => { setDragTarget(null); setDragNotes(''); };

  const flash = msg => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const logAudit = async (action, entityId, entityName, changes, notes) => {
    try {
      await supabase.from('audit_log').insert({
        user_email: user.email,
        user_name: user.user_metadata?.full_name || user.email,
        user_avatar: user.user_metadata?.avatar_url || null,
        action,
        entity_type: 'deal',
        entity_id: entityId,
        entity_name: entityName,
        changes,
        notes: notes || null
      });
    } catch(e) { /* audit failures are silent */ }
  };

  const toggleStatFilter = (key) => {
    if (statFilter === key) { setStatFilter(null); }
    else { setStatFilter(key); setStageF('all'); setRegionF('all'); setFriendlyF(false); setSearch(''); }
  };

  const save = async () => {
    const u = {};
    ['stage','deal_owner_id','next_action','next_action_due','next_action_owner_id','champion_name','deal_value','status','stall_reason','notes','partner_id','region','is_friendly_client','friendly_client_notes','client_id'].forEach(k => {
      if (form[k] !== undefined) u[k] = k === 'deal_value' ? (form[k] || null) : (k === 'partner_id' ? (form[k] || null) : form[k]);
    });
    const { error } = await supabase.from('deals').update(u).eq('id', sel.id);
    if (error) { flash('Error: ' + error.message); return; }
    const auditFields = ['stage','deal_value','status','next_action','next_action_due','champion_name','region','deal_owner_id','close_probability','notes'];
    const changes = {};
    auditFields.forEach(k => { if (u[k] !== undefined && String(u[k]??'') !== String(sel[k]??'')) changes[k] = { from: sel[k], to: u[k] }; });
    if (Object.keys(changes).length > 0) logAudit('deal_edit', sel.id, sel.account_name, changes, null);
    setDeals(prev => prev.map(d => d.id === sel.id ? {...d, ...u} : d));
    setSel(prev => ({...prev, ...u}));
    setEditing(false);
    flash('Deal updated');
  };

  if (loading) return (
    <div className="loading-screen">
      <div className="loading-spinner"></div>
      <div style={{color:'var(--text-muted)',fontSize:13,fontWeight:500}}>Loading pipeline…</div>
    </div>
  );

  if (page === 'account') {
    return <AccountView dealId={selId} deals={deals} teamMembers={team} clients={clients} onBack={() => {setPage('board'); setSelId(null);}} onDealUpdated={(id, u) => setDeals(prev => prev.map(d => d.id === id ? {...d, ...u} : d))} onSelectDeal={(id) => {setSelId(id); setPage('account');}} user={user} />;
  }

  if (page === 'revenue') {
    return (
      <div>
        <div className="header">
          <div className="header-left">
            <div className="logo">
              <span className="logo-conquer">Conquer</span><span className="logo-ai">AI</span>
            </div>
            <div className="logo-divider"></div>
            <span className="logo-product">Control Room</span>
          </div>
          <div className="header-right">
            <div className="view-toggle">
              <button className="view-btn" onClick={()=>{setPage('board');setView('kanban');}}>Board</button>
              <button className="view-btn" onClick={()=>{setPage('board');setView('table');}}>Table</button>
              <button className="view-btn active" style={{background:'var(--stage-procurement)',color:'white'}}>Revenue</button>
              <button className="view-btn" onClick={()=>setPage('clients')}>Clients</button>
            </div>
            <button className="refresh-btn" onClick={load}>↻ Refresh</button>
            <button className="audit-btn" onClick={() => setAuditOpen(true)}>Audit Log</button>
            <div className="user-pill">
              <div className="user-avatar">{user.user_metadata?.avatar_url ? <img src={user.user_metadata.avatar_url} alt="" /> : initials(user.user_metadata?.full_name || user.email)}</div>
              <span className="user-name">{user.user_metadata?.full_name || user.email.split('@')[0]}</span>
            </div>
            <button className="signout-btn" onClick={() => supabase.auth.signOut()}>Sign out</button>
          </div>
        </div>
        <RevenueView deals={deals} teamMembers={team} onDealClick={(id) => {setSelId(id); setPage('account');}} />
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  if (page === 'clients') {
    return (
      <div>
        <div className="header">
          <div className="header-left">
            <div className="logo">
              <span className="logo-conquer">Conquer</span><span className="logo-ai">AI</span>
            </div>
            <div className="logo-divider"></div>
            <span className="logo-product">Control Room</span>
          </div>
          <div className="header-right">
            <div className="view-toggle">
              <button className="view-btn" onClick={()=>{setPage('board');setView('kanban');}}>Board</button>
              <button className="view-btn" onClick={()=>{setPage('board');setView('table');}}>Table</button>
              <button className="view-btn" onClick={()=>setPage('revenue')}>Revenue</button>
              <button className="view-btn active" style={{background:'var(--accent)',color:'white'}}>Clients</button>
            </div>
            <button className="refresh-btn" onClick={load}>↻ Refresh</button>
            <button className="audit-btn" onClick={() => setAuditOpen(true)}>Audit Log</button>
            <div className="user-pill">
              <div className="user-avatar">{user.user_metadata?.avatar_url ? <img src={user.user_metadata.avatar_url} alt="" /> : initials(user.user_metadata?.full_name || user.email)}</div>
              <span className="user-name">{user.user_metadata?.full_name || user.email.split('@')[0]}</span>
            </div>
            <button className="signout-btn" onClick={() => supabase.auth.signOut()}>Sign out</button>
          </div>
        </div>
        <ClientsView clients={clients} deals={deals} teamMembers={team} onDealClick={(id) => {setSelId(id); setPage('account');}} />
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <div className="logo">
            <span className="logo-conquer">Conquer</span><span className="logo-ai">AI</span>
          </div>
          <div className="logo-divider"></div>
          <span className="logo-product">Control Room</span>
        </div>
        <div className="header-right">
          <div className="view-toggle">
            <button className={`view-btn ${page==='board'&&view==='kanban'?'active':''}`} onClick={()=>{setPage('board');setView('kanban');}}>Board</button>
            <button className={`view-btn ${page==='board'&&view==='table'?'active':''}`} onClick={()=>{setPage('board');setView('table');}}>Table</button>
            <button className={`view-btn ${page==='revenue'?'active':''}`} onClick={()=>setPage('revenue')} style={page==='revenue'?{background:'var(--stage-procurement)',color:'white'}:{}}>Revenue</button>
            <button className={`view-btn ${page==='clients'?'active':''}`} onClick={()=>setPage('clients')} style={page==='clients'?{background:'var(--accent)',color:'white'}:{}}>Clients</button>
          </div>
          <button className="refresh-btn" onClick={load}>↻ Refresh</button>
          <button className="audit-btn" onClick={() => setAuditOpen(true)}>Audit Log</button>
          <div className="user-pill">
            <div className="user-avatar">{user.user_metadata?.avatar_url ? <img src={user.user_metadata.avatar_url} alt="" /> : initials(user.user_metadata?.full_name || user.email)}</div>
            <span className="user-name">{user.user_metadata?.full_name || user.email.split('@')[0]}</span>
          </div>
          <button className="signout-btn" onClick={() => supabase.auth.signOut()}>Sign out</button>
        </div>
      </div>

      {/* Stats */}
      <div className="stats-bar">
        <div className="stat-card">
          <div className="stat-label">Pipeline Value</div>
          <div className="stat-value" style={{color:'var(--accent)'}}>{fmt(stats.val)}</div>
          <div className="stat-sub">Weighted: {fmt(Math.round(stats.w))}</div>
        </div>
        <div className={`stat-card stat-clickable ${statFilter==='opportunities'?'stat-active':''}`} onClick={()=>toggleStatFilter('opportunities')}>
          <div className="stat-label">Opportunities</div>
          <div className="stat-row">
            <div className="stat-value" style={{color:'var(--teal)'}}>{stats.total}</div>
            <span className="stat-badge" style={{background:'var(--orange-bg)',color:'var(--orange)'}}>{stats.preCommercial} early</span>
          </div>
          <div className="stat-sub">{stats.commercial} in commercial territory</div>
        </div>
        <div className={`stat-card stat-clickable ${statFilter==='proposals'?'stat-active':''}`} onClick={()=>toggleStatFilter('proposals')}>
          <div className="stat-label">Proposals Active</div>
          <div className="stat-row">
            <div className="stat-value" style={{color:'var(--stage-procurement)'}}>{stats.proposals}</div>
          </div>
          <div className="stat-sub">{fmt(stats.proposalVal)} total value</div>
        </div>
        <div className={`stat-card stat-clickable ${statFilter==='closing30'?'stat-active':''}`} onClick={()=>toggleStatFilter('closing30')}>
          <div className="stat-label">Closing in 30 Days</div>
          <div className="stat-row">
            <div className="stat-value" style={{color:'var(--orange)'}}>{stats.closing30}</div>
          </div>
          <div className="stat-sub">{fmt(Math.round(stats.closing30Weighted))} weighted</div>
        </div>
        <div className={`stat-card stat-clickable ${statFilter==='atRisk'?'stat-active':''}`} onClick={()=>toggleStatFilter('atRisk')}>
          <div className="stat-label">Needs Attention</div>
          <div className="stat-row">
            <div className="stat-value" style={{color:stats.atRisk>0?'var(--red)':'var(--text-dim)'}}>{stats.atRisk}</div>
          </div>
          <div className="stat-sub">{stats.critical} critical · {stats.watch} watch</div>
        </div>
        <div className={`stat-card stat-clickable ${statFilter==='analytics'?'stat-active':''}`} onClick={()=>toggleStatFilter('analytics')}>
          <div className="stat-label">Avg Close Probability</div>
          <div className="stat-row">
            <div className="stat-value" style={{color:stats.avgProb>=50?'var(--accent)':stats.avgProb>=30?'var(--orange)':'var(--red)'}}>{stats.avgProb}%</div>
          </div>
          <div className="stat-sub">Across {stats.commercial} commercial opportunities</div>
        </div>
      </div>

      {/* Active stat filter banner */}
      {statFilter && statFilter !== 'analytics' && (
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'6px 32px',background:'var(--accent-subtle)',borderBottom:'1px solid var(--accent)'}}>
          <span style={{fontSize:11,fontWeight:600,color:'var(--accent)'}}>
            {statFilter === 'opportunities' && `Showing ${filtered.length} active opportunities`}
            {statFilter === 'proposals' && `Showing ${filtered.length} proposals & procurement opportunities`}
            {statFilter === 'closing30' && `Showing ${filtered.length} opportunities closing within 30 days`}
            {statFilter === 'atRisk' && `Showing ${filtered.length} opportunities needing attention (${stats.critical} critical · ${stats.atRisk - stats.critical} elevated)`}
          </span>
          <button onClick={()=>setStatFilter(null)} style={{marginLeft:'auto',background:'none',border:'1px solid var(--accent)',borderRadius:3,color:'var(--accent)',fontSize:10,fontWeight:600,padding:'2px 8px',cursor:'pointer',transition:'all 0.15s'}} onMouseEnter={e=>{e.currentTarget.style.background='var(--accent)';e.currentTarget.style.color='#fff';}} onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='var(--accent)';}}>Clear filter</button>
        </div>
      )}

      {/* Filters */}
      {statFilter !== 'analytics' && (
      <div className="filter-bar">
        <input className="search-input" placeholder="Search opportunities…" value={search} onChange={e=>{setSearch(e.target.value); setStatFilter(null);}} />
        <button className={`filter-chip ${stageF==='all'&&!statFilter?'active':''}`} onClick={()=>{setStageF('all'); setStatFilter(null);}}>All</button>
        {STAGES.map(s => <button key={s.key} className={`filter-chip ${stageF===s.key&&!statFilter?'active':''}`} onClick={()=>{setStageF(s.key); setStatFilter(null);}}>{s.label}</button>)}
        <div className="filter-sep"></div>
        <button className={`filter-chip ${regionF==='all'?'active':''}`} onClick={()=>{setRegionF('all'); setStatFilter(null);}}>All Regions</button>
        {regions.map(r => <button key={r} className={`filter-chip ${regionF===r?'active':''}`} onClick={()=>{setRegionF(r); setStatFilter(null);}}>{r}</button>)}
        <div className="filter-sep"></div>
        <button className={`filter-chip ${friendlyF?'active':''}`} onClick={()=>{setFriendlyF(!friendlyF); setStatFilter(null);}} style={friendlyF?{borderColor:'#6B72DB',background:'rgba(107,114,219,0.08)',color:'#6B72DB'}:{}}>Friendly Clients</button>
      </div>
      )}

      {/* Analytics View */}
      {statFilter === 'analytics' && (() => {
        const commercial = deals.filter(d => ['proposal','procurement','contract_signed'].includes(d.stage));
        const withProb = commercial.filter(d => d.close_probability > 0);
        const noProb = commercial.filter(d => !d.close_probability);
        const avgProb = withProb.length ? Math.round(withProb.reduce((s,d) => s + d.close_probability, 0) / withProb.length) : 0;
        const totalWeighted = commercial.reduce((s,d) => s + (d.deal_value || 0) * ((d.close_probability || 0) / 100), 0);
        const totalPipeline = commercial.reduce((s,d) => s + (d.deal_value || 0), 0);
        const buckets = [{label:'0–20%',min:0,max:20,color:'var(--red)'},{label:'21–40%',min:21,max:40,color:'var(--orange)'},{label:'41–60%',min:41,max:60,color:'#6B7280'},{label:'61–80%',min:61,max:80,color:'var(--teal)'},{label:'81–100%',min:81,max:100,color:'var(--accent)'}];
        const bucketData = buckets.map(b => {
          const ds = withProb.filter(d => d.close_probability >= b.min && d.close_probability <= b.max);
          return {...b, count:ds.length, value:ds.reduce((s,d) => s + (d.deal_value||0), 0)};
        });
        const maxBucket = Math.max(...bucketData.map(b => b.count), 1);
        const stageBreakdown = ['proposal','procurement'].map(st => {
          const sd = commercial.filter(d => d.stage === st);
          const avg = sd.filter(d => d.close_probability > 0);
          return { stage:STAGE_MAP[st]?.label||st, stageKey:st, count:sd.length, avgProb:avg.length?Math.round(avg.reduce((s,d)=>s+d.close_probability,0)/avg.length):0, value:sd.reduce((s,d)=>s+(d.deal_value||0),0), weighted:sd.reduce((s,d)=>s+(d.deal_value||0)*((d.close_probability||0)/100),0) };
        });
        const topOpps = [...commercial].filter(d => d.deal_value > 0).sort((a,b) => (b.deal_value||0)*(b.close_probability||0) - (a.deal_value||0)*(a.close_probability||0)).slice(0, 8);
        const missingProb = noProb.filter(d => d.deal_value > 0).sort((a,b) => (b.deal_value||0)-(a.deal_value||0));
        const stalledCommercial = commercial.filter(d => { const h = healthMap[d.id]; return h && (h.health === 'critical' || h.health === 'at_risk'); });
        const recommendations = [];
        if (noProb.length > 0) recommendations.push({type:'warning',title:`${noProb.length} opportunities missing close probability`,detail:'Excluded from weighted pipeline. Assigning probabilities improves forecast accuracy.',action:'Review and assign'});
        if (avgProb < 40) recommendations.push({type:'alert',title:`Average probability low at ${avgProb}%`,detail:'Deals may be stuck or poorly qualified. Review champion engagement for deals below 30%.',action:'Audit low-probability deals'});
        if (stalledCommercial.length > 0) recommendations.push({type:'alert',title:`${stalledCommercial.length} commercial opportunities need attention`,detail:'These have multiple risk signals (inactivity, overdue actions, stuck in stage). Re-engage or re-qualify.',action:'Review flagged deals'});
        if (totalWeighted < totalPipeline * 0.4) recommendations.push({type:'info',title:'Weighted pipeline below 40% of total',detail:`${fmt(Math.round(totalWeighted))} of ${fmt(totalPipeline)} weighted. May indicate too many low-confidence deals.`,action:'Advance high-value deals'});
        if (avgProb >= 60) recommendations.push({type:'success',title:`Strong confidence at ${avgProb}%`,detail:'Pipeline is well-qualified. Focus on accelerating through procurement to close.',action:'Push for signed contracts'});
        const missingVal = commercial.filter(d => !d.deal_value);
        if (missingVal.length > 0) recommendations.push({type:'warning',title:`${missingVal.length} opportunities missing deal value`,detail:'Cannot contribute to weighted pipeline. Even rough estimates improve forecasting.',action:'Add estimated values'});
        const recColors = {alert:'var(--red)',warning:'var(--orange)',info:'var(--blue)',success:'var(--accent)'};
        const recBg = {alert:'var(--red-bg)',warning:'var(--orange-bg)',info:'var(--blue-bg)',success:'var(--teal-bg)'};
        const convRate = totalPipeline>0?Math.round(totalWeighted/totalPipeline*100):0;
        return (
          <div style={{padding:'0 32px 32px'}}>
            {/* Section header */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:15,fontWeight:600,color:'var(--text)',letterSpacing:'-0.3px'}}>Pipeline Analytics</span>
                <span style={{fontSize:11,color:'var(--text-dim)',padding:'2px 8px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>{commercial.length} commercial opportunities</span>
              </div>
              <button onClick={()=>setStatFilter(null)} style={{fontSize:11,color:'var(--text-muted)',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'4px 12px',cursor:'pointer',transition:'all 0.15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border-light)';e.currentTarget.style.color='var(--text)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-muted)';}}>Back to Board</button>
            </div>

            {/* KPI row — 4 compact metrics */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
              {[
                {label:'Avg Close Probability',value:`${avgProb}%`,color:avgProb>=50?'var(--accent)':avgProb>=30?'var(--orange)':'var(--red)',sub:`${withProb.length} rated of ${commercial.length}`},
                {label:'Weighted Pipeline',value:fmt(Math.round(totalWeighted)),color:'var(--accent)',sub:`of ${fmt(totalPipeline)} total`},
                {label:'Conversion Rate',value:`${convRate}%`,color:convRate>=50?'var(--accent)':convRate>=30?'var(--text)':'var(--orange)',sub:'Weighted ÷ Total'},
                {label:'Unrated',value:`${noProb.length}`,color:noProb.length>0?'var(--orange)':'var(--text-dim)',sub:'No probability set'}
              ].map((kpi,i) => (
                <div key={i} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'12px 14px',position:'relative',overflow:'hidden'}}>
                  <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:i===0?'var(--accent)':i===1?'var(--teal)':i===2?'var(--blue)':'var(--orange)'}}></div>
                  <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.8px',color:'var(--text-muted)',marginBottom:4}}>{kpi.label}</div>
                  <div style={{fontSize:22,fontWeight:700,letterSpacing:'-0.5px',color:kpi.color,fontVariantNumeric:'tabular-nums'}}>{kpi.value}</div>
                  <div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>{kpi.sub}</div>
                </div>
              ))}
            </div>

            {/* Two-column: Distribution + Stage Breakdown */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
              {/* Probability distribution */}
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'14px 16px'}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:14,textTransform:'uppercase',letterSpacing:'0.5px'}}>Probability Distribution</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {bucketData.map(b => (
                    <div key={b.label} style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',width:44,textAlign:'right',flexShrink:0}}>{b.label}</span>
                      <div style={{flex:1,height:20,background:'var(--bg-elevated)',borderRadius:3,overflow:'hidden'}}>
                        <div style={{width:`${(b.count/maxBucket)*100}%`,height:'100%',background:b.color,borderRadius:3,transition:'width 0.4s ease',minWidth:b.count>0?4:0,opacity:0.85}}></div>
                      </div>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--text)',width:18,textAlign:'right',flexShrink:0}}>{b.count}</span>
                      <span style={{fontSize:10,color:'var(--text-dim)',width:50,textAlign:'right',flexShrink:0}}>{b.value>0?fmt(b.value):'—'}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Stage breakdown */}
              <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'14px 16px'}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:14,textTransform:'uppercase',letterSpacing:'0.5px'}}>Stage Breakdown</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {stageBreakdown.map(sb => (
                    <div key={sb.stage} style={{padding:'10px 12px',background:'var(--bg-elevated)',borderRadius:'var(--radius)',borderLeft:`3px solid ${STAGE_MAP[sb.stageKey]?.color||'var(--border)'}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{sb.stage}</span>
                        <span style={{fontSize:10,color:'var(--text-dim)'}}>{sb.count} opps</span>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                        <div><div style={{fontSize:9,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}}>Avg Prob</div><div style={{fontSize:15,fontWeight:700,color:sb.avgProb>=50?'var(--accent)':sb.avgProb>=30?'var(--orange)':'var(--red)'}}>{sb.avgProb}%</div></div>
                        <div><div style={{fontSize:9,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}}>Pipeline</div><div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{fmt(sb.value)}</div></div>
                        <div><div style={{fontSize:9,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}}>Weighted</div><div style={{fontSize:15,fontWeight:700,color:'var(--accent)'}}>{fmt(Math.round(sb.weighted))}</div></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Recommendations — compact horizontal cards */}
            {recommendations.length > 0 && (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px',padding:'0 2px'}}>Recommendations</div>
                <div style={{display:'grid',gridTemplateColumns:recommendations.length<=2?'repeat('+recommendations.length+',1fr)':recommendations.length<=3?'repeat(3,1fr)':'repeat(2,1fr)',gap:10}}>
                  {recommendations.map((r, i) => (
                    <div key={i} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'12px 14px',borderLeft:`3px solid ${recColors[r.type]}`}}>
                      <div style={{fontSize:11,fontWeight:600,color:'var(--text)',marginBottom:3,lineHeight:1.4}}>{r.title}</div>
                      <div style={{fontSize:10,color:'var(--text-dim)',lineHeight:1.5,marginBottom:6}}>{r.detail}</div>
                      <span style={{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',padding:'2px 6px',borderRadius:3,color:recColors[r.type],background:recBg[r.type]}}>{r.action}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Two-column: Top Opps + Missing Probability */}
            <div style={{display:'grid',gridTemplateColumns:missingProb.length>0?'2fr 1fr':'1fr',gap:10}}>
              {/* Top weighted opportunities */}
              {topOpps.length > 0 && (
                <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'14px 16px'}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}}>Top Opportunities by Weighted Value</div>
                  <div style={{display:'flex',flexDirection:'column',gap:1}}>
                    {topOpps.map((d,idx) => {
                      const weighted = Math.round((d.deal_value||0) * ((d.close_probability||0)/100));
                      const owner = tm[d.deal_owner_id];
                      return (
                        <div key={d.id} onClick={()=>{setSelId(d.id);setPage('account');setStatFilter(null);}} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 10px',borderRadius:'var(--radius)',cursor:'pointer',transition:'background 0.15s',background:idx%2===0?'var(--bg-elevated)':'transparent'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg-card-hover)'} onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?'var(--bg-elevated)':'transparent'}>
                          <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
                            <span style={{fontSize:10,fontWeight:700,color:'var(--text-dim)',width:16,flexShrink:0}}>{idx+1}</span>
                            <div style={{minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{d.account_name}</div>
                              <div style={{fontSize:10,color:'var(--text-dim)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{d.project_name}</div>
                            </div>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
                            <div style={{textAlign:'right'}}>
                              <div style={{fontSize:12,fontWeight:700,color:'var(--accent)'}}>{fmt(weighted)}</div>
                              <div style={{fontSize:9,color:'var(--text-dim)'}}>{d.close_probability}% × {fmt(d.deal_value)}</div>
                            </div>
                            <span style={{fontSize:9,fontWeight:600,padding:'2px 6px',borderRadius:3,color:'#fff',background:STAGE_MAP[d.stage]?.color,textTransform:'uppercase',letterSpacing:'0.3px'}}>{STAGE_MAP[d.stage]?.label}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Missing probability */}
              {missingProb.length > 0 && (
                <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'14px 16px',borderTop:`2px solid var(--orange)`}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                    <span style={{fontSize:12,fontWeight:600,color:'var(--orange)',textTransform:'uppercase',letterSpacing:'0.5px'}}>Missing Probability</span>
                    <span style={{fontSize:10,color:'var(--text-dim)',background:'var(--orange-bg)',padding:'1px 6px',borderRadius:3,fontWeight:600}}>{missingProb.length}</span>
                  </div>
                  <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:10,lineHeight:1.4}}>Deal values set but no probability — excluded from weighted pipeline.</div>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {missingProb.map(d => (
                      <div key={d.id} onClick={()=>{setSelId(d.id);setPage('account');setStatFilter(null);}} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 8px',background:'var(--bg-elevated)',borderRadius:'var(--radius)',cursor:'pointer',transition:'background 0.15s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg-card-hover)'} onMouseLeave={e=>e.currentTarget.style.background='var(--bg-elevated)'}>
                        <div style={{minWidth:0,flex:1}}>
                          <div style={{fontSize:11,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{d.account_name}</div>
                          <div style={{fontSize:9,color:'var(--text-dim)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{d.project_name}</div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                          <span style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{fmt(d.deal_value)}</span>
                          <span style={{fontSize:9,fontWeight:600,padding:'2px 5px',borderRadius:3,color:'#fff',background:STAGE_MAP[d.stage]?.color,textTransform:'uppercase'}}>{STAGE_MAP[d.stage]?.label}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Kanban */}
      {statFilter !== 'analytics' && view === 'kanban' && (
        <div className="kanban-container">
          {STAGES.map(stage => {
            const sd = filtered.filter(d => d.stage === stage.key).sort((a,b) => (b.deal_value||0) - (a.deal_value||0));
            const sv = sd.reduce((s,d) => s + (d.deal_value||0), 0);
            return (
              <div className="kanban-col" key={stage.key}>
                <div className="kanban-header" style={{background:stage.color}}>
                  <h3>{stage.label} <span className="kanban-count">{sd.length}</span></h3>
                  <span className="kanban-value">{fmt(sv)}</span>
                </div>
                <div className="kanban-cards"
                  onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
                  onDragLeave={e => { e.currentTarget.classList.remove('drag-over'); }}
                  onDrop={e => { e.currentTarget.classList.remove('drag-over'); handleDrop(stage.key); }}>
                  {sd.map(d => {
                    const owner = tm[d.deal_owner_id];
                    const clientObj = cm[d.client_id];
                    const health = healthMap[d.id] || getDealHealth(d);
                    const isCritical = health.health === 'critical';
                    const isAtRisk = health.health === 'at_risk';
                    const isWatch = health.health === 'watch';
                    const dueDays = daysUntil(d.next_action_due);
                    const isOverdue = dueDays !== null && dueDays < 0;
                    const hasMultiOpp = clientObj && deals.filter(x => x.client_id === clientObj.id).length > 1;
                    return (
                      <div key={d.id} draggable="true"
                        onDragStart={() => setDragId(d.id)}
                        onDragEnd={() => setDragId(null)}
                        className={`deal-card ${isCritical?'stalled':''} ${isOverdue?'overdue':''} ${dragId===d.id?'dragging':''}`}
                        onClick={() => {setSelId(d.id); setPage('account');}}>
                        <div className="deal-name">{clientObj ? clientObj.name : d.account_name}{hasMultiOpp && <span style={{fontSize:9,color:'var(--text-muted)',marginLeft:6,fontWeight:400}}>({deals.filter(x=>x.client_id===clientObj.id).length})</span>}</div>
                        <div className="deal-project">{d.account_name !== clientObj?.name ? d.account_name + ' — ' : ''}{d.project_name}</div>
                        <div className="deal-meta">
                          {d.region && <span className="deal-tag tag-region">{d.region}</span>}
                          <span className="deal-tag tag-value">{fmt(d.deal_value,d.deal_value_note)}</span>
                          {isCritical && <span className="deal-tag tag-stalled">Critical</span>}
                          {isAtRisk && !isCritical && <span className="deal-tag" style={{background:'var(--orange-bg)',color:'var(--orange)'}}>Needs Attention</span>}
                          {isOverdue && <span className="deal-tag tag-overdue">Overdue</span>}
                          {d.is_friendly_client && <span className="deal-tag tag-friendly">Friendly</span>}
                        </div>
                        {d.next_action && <div className="deal-action"><span className="deal-action-arrow">›</span>{d.next_action}</div>}
                        {d.next_action_due && <div className={`deal-due ${isOverdue?'overdue':''}`}>{isOverdue?`${-dueDays}d overdue`:`Due ${dueDays}d`}</div>}
                        {owner && <div className="deal-owner-row"><div className="deal-owner-avatar">{initials(owner.display_name)}</div><div className="deal-owner-name">{owner.display_name}</div></div>}
                        {d.intel_engagement_id && <div className="deal-intel-badge" title="Synced to Conquer Intel">⚡ Intel</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Table */}
      {statFilter !== 'analytics' && view === 'table' && (
        <div className="table-container">
          <table className="data-table">
            <thead>
              <tr>
                <th>Client</th>
                <th>Opportunity</th>
                <th>Stage</th>
                <th>Value</th>
                <th>Owner</th>
                <th>Status</th>
                <th>Next Action</th>
                <th>Due</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(d => {
                const owner = tm[d.deal_owner_id];
                const clientObj = cm[d.client_id];
                const stageInfo = STAGE_MAP[d.stage];
                const dueDays = daysUntil(d.next_action_due);
                const isOverdue = dueDays !== null && dueDays < 0;
                return (
                  <tr key={d.id} onClick={() => {setSelId(d.id); setPage('account');}}>
                    <td>{clientObj ? clientObj.name : d.account_name}{d.is_friendly_client && <span className="deal-tag tag-friendly" style={{marginLeft:6,verticalAlign:'middle'}}>Friendly</span>}</td>
                    <td>{d.account_name !== clientObj?.name ? d.account_name + ' — ' : ''}{d.project_name}</td>
                    <td><span className="stage-badge" style={{background:stageInfo?.color}}>{stageInfo?.label}</span></td>
                    <td>{fmt(d.deal_value,d.deal_value_note)}</td>
                    <td>{owner?.display_name||'—'}</td>
                    <td style={{color:(healthMap[d.id]||{}).health==='critical'?'var(--red)':(healthMap[d.id]||{}).health==='at_risk'?'var(--orange)':'inherit'}}>{(healthMap[d.id]||{}).health==='critical'?'Critical':(healthMap[d.id]||{}).health==='at_risk'?'Needs Attention':(healthMap[d.id]||{}).health==='watch'?'Watch':'Healthy'}</td>
                    <td>{d.next_action||'—'}</td>
                    <td style={{color:isOverdue?'var(--orange)':'inherit'}}>{d.next_action_due?`${isOverdue?'-':''}${Math.abs(dueDays||0)}d`:'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {dragTarget && (
        <>
          <div className="overlay" onClick={cancelDrop}></div>
          <div className="stage-modal">
            <div className="stage-modal-title">Move {dragTarget.deal.account_name}</div>
            <div className="stage-modal-sub">{dragTarget.deal.project_name}</div>
            <div className="stage-modal-arrow">
              <span className="stage-modal-badge" style={{background:STAGE_MAP[dragTarget.deal.stage]?.color}}>{STAGE_MAP[dragTarget.deal.stage]?.label}</span>
              <span style={{color:'var(--text-dim)'}}>→</span>
              <span className="stage-modal-badge" style={{background:STAGE_MAP[dragTarget.targetStage]?.color}}>{STAGE_MAP[dragTarget.targetStage]?.label}</span>
            </div>
            <div className="stage-modal-label">Notes</div>
            <textarea className="stage-modal-notes" placeholder="Why is this deal moving? Any context for the team..." value={dragNotes} onChange={e => setDragNotes(e.target.value)} autoFocus />
            <div className="stage-modal-btns">
              <button className="btn btn-secondary" onClick={cancelDrop}>Cancel</button>
              <button className="btn btn-primary" onClick={confirmDrop}>Confirm Move</button>
            </div>
          </div>
        </>
      )}

      {toast && <div className="toast">{toast}</div>}
      {auditOpen && <AuditLogPanel onClose={() => setAuditOpen(false)} />}
    </div>
  );
}

const ALLOWED_DOMAIN = 'conquer.ai';

function LoginScreen({ authError, loading }) {
  const handleGoogle = async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.href,
        queryParams: { hd: ALLOWED_DOMAIN }
      }
    });
  };

  return (
    <div className="auth-wrapper">
      <div className="auth-card">
        <div className="auth-accent-bar"></div>
        <div className="auth-logo">
          <span className="auth-logo-conquer">Conquer</span>
          <span className="auth-logo-ai">AI</span>
        </div>
        <div className="auth-title">Sales Control Room</div>
        <div className="auth-sub">Sign in with your Conquer AI Google account to access the pipeline.</div>
        <button className="google-btn" onClick={handleGoogle} disabled={loading}>
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          {loading ? 'Signing in…' : 'Sign in with Google'}
        </button>
        {authError && <div className="auth-error">{authError}</div>}
        <div className="auth-domain-note">Access restricted to @{ALLOWED_DOMAIN} accounts</div>
      </div>
    </div>
  );
}

function Root() {
  const [session, setSession] = React.useState(null);
  const [authLoading, setAuthLoading] = React.useState(true);
  const [authError, setAuthError] = React.useState(null);

  React.useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        if (!session.user.email.endsWith('@' + ALLOWED_DOMAIN)) {
          supabase.auth.signOut();
          setAuthError('Access restricted to @' + ALLOWED_DOMAIN + ' accounts.');
        } else {
          setSession(session);
        }
      }
      setAuthLoading(false);
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      if (session && !session.user.email.endsWith('@' + ALLOWED_DOMAIN)) {
        supabase.auth.signOut();
        setAuthError('Access restricted to @' + ALLOWED_DOMAIN + ' accounts.');
        setSession(null);
      } else {
        setSession(session);
        if (session) setAuthError(null);
      }
      setAuthLoading(false);
    });

    return () => subscription.unsubscribe();
  }, []);

  if (authLoading) return (
    <div className="loading-screen">
      <div className="loading-spinner"></div>
      <div style={{color:'var(--text-muted)',fontSize:13,fontWeight:500}}>Authenticating…</div>
    </div>
  );

  if (!session) return <LoginScreen authError={authError} />;
  return <App user={session.user} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
