      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span className="split-deal-stage" style={{background:STAGE_MAP[d.stage]?.color}}>{STAGE_MAP[d.stage]?.label}</span>
        <span className="split-deal-value">{fmt(d.deal_value)}</span>
      </div>
    </div>
  ));

  return (
    <>
      <div className="rev-section">
        <div className="rev-section-header">
          <span className="rev-section-title">Account Growth</span>
          <span className="rev-section-badge" style={{background:'var(--teal-bg)',color:'var(--teal)'}}>{fmt(growthVal)}</span>
        </div>
        <div className="rev-section-body">
          <div className="split-col">
            <div className="split-col-header"><span>{growth.length} deals</span><span>Expanding existing</span></div>
            {growth.length === 0 && <div className="rev-empty">No account growth deals tagged</div>}
            {renderDeals(growth)}
          </div>
        </div>
      </div>
      <div className="rev-section">
        <div className="rev-section-header">
          <span className="rev-section-title">New Business</span>
          <span className="rev-section-badge" style={{background:'var(--blue-bg)',color:'var(--blue)'}}>{fmt(newBizVal)}</span>
        </div>
        <div className="rev-section-body">
          <div className="split-col">
            <div className="split-col-header"><span>{newBiz.length} deals</span><span>Net new logos</span></div>
            {newBiz.length === 0 && <div className="rev-empty">No new business deals</div>}
            {renderDeals(newBiz)}
          </div>
        </div>
      </div>
    </>
  );
}

function PathwayToInvoice({ deals, teamMembers, onDealClick }) {
  const tmMap = useMemo(() => Object.fromEntries(teamMembers.map(t => [t.id, t])), [teamMembers]);
  const [expanded, setExpanded] = useState({});

  // Focus on deals closest to money: proposal, procurement stages
  const invoiceDeals = useMemo(() => {
    return deals
      .filter(d => ['proposal', 'procurement', 'poc'].includes(d.stage) && d.status === 'active')
      .sort((a, b) => {
        const stageOrder = { procurement: 0, proposal: 1, poc: 2 };
        const so = (stageOrder[a.stage] || 9) - (stageOrder[b.stage] || 9);
        return so !== 0 ? so : (b.deal_value || 0) - (a.deal_value || 0);
      });
  }, [deals]);

  const toggleExpand = (id) => setExpanded(prev => ({...prev, [id]: !prev[id]}));

  // Generate default pathway steps if none stored
  const getSteps = (deal) => {
    if (deal.pathway_steps && Array.isArray(deal.pathway_steps) && deal.pathway_steps.length > 0) {
      return deal.pathway_steps;
    }
    // Default pathway based on stage
    const defaults = {
      poc: [
        { step: 'Complete POC delivery', done: false },
        { step: 'Get stakeholder sign-off on POC results', done: false },
        { step: 'Submit commercial proposal', done: false },
        { step: 'Navigate procurement', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
      proposal: [
        { step: 'Proposal submitted and reviewed', done: false },
        { step: 'Commercial terms agreed', done: false },
        { step: 'Navigate procurement / legal', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
      procurement: [
        { step: 'Legal / procurement review complete', done: false },
        { step: 'Final sign-off from decision maker', done: false },
        { step: 'Contract signed → Invoice', done: false },
      ],
    };
    return defaults[deal.stage] || [{ step: 'Move to next stage', done: false }];
  };

  return (
    <div className="pathway-section">
      <div className="rev-section-header" style={{borderBottom:'1px solid var(--border)'}}>
        <span className="rev-section-title">Pathway to Invoice</span>
        <span className="rev-section-badge" style={{background:'var(--accent-subtle)',color:'var(--accent)'}}>{invoiceDeals.length} deals in flight</span>
      </div>
      {invoiceDeals.length === 0 && <div className="rev-empty">No deals approaching invoice stage</div>}
      {invoiceDeals.map(d => {
        const steps = getSteps(d);
        const doneCount = steps.filter(s => s.done).length;
        const isOpen = expanded[d.id];
        return (
          <div key={d.id} className="pathway-deal">
            <div className="pathway-deal-header" onClick={() => toggleExpand(d.id)}>
              <div className="pathway-deal-left">
                <span style={{color:'var(--text-dim)',fontSize:12,fontWeight:600}}>{isOpen ? '▾' : '▸'}</span>
                <div>
                  <div className="pathway-deal-name">{d.account_name}</div>
                  <div style={{fontSize:11,color:'var(--text-dim)'}}>{d.project_name} · <span style={{color:STAGE_MAP[d.stage]?.color}}>{STAGE_MAP[d.stage]?.label}</span></div>
                </div>
              </div>
              <div className="pathway-deal-right">
                <span style={{fontSize:11,color:'var(--text-dim)'}}>{doneCount}/{steps.length} steps</span>
                <span className="pathway-deal-value">{fmt(d.deal_value)}</span>
              </div>
            </div>
            {isOpen && (
              <div className="pathway-steps-list">
                {steps.map((s, i) => {
                  const owner = s.owner_id ? tmMap[s.owner_id] : null;
                  return (
                    <div key={i} className="pathway-step">
                      <div className={`pathway-step-num ${s.done ? 'done' : 'pending'}`}>{s.done ? '✓' : i + 1}</div>
                      <div className="pathway-step-content">
                        <div className="pathway-step-title" style={s.done?{textDecoration:'line-through',color:'var(--text-dim)'}:{}}>{s.step}</div>
                        {owner && <div className="pathway-step-owner">{owner.display_name}</div>}
                        {s.due && <div className="pathway-step-due">Due: {new Date(s.due).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>}
                      </div>
                    </div>
                  );
                })}
                <div style={{textAlign:'right',marginTop:8}}>
                  <span style={{fontSize:10,color:'var(--text-muted)',cursor:'pointer'}} onClick={() => onDealClick && onDealClick(d.id)}>View full deal →</span>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function LinkDealModal({ initiativeId, onClose, onLinked, currentUser }) {
  const [search, setSearch] = useState('');
  const [deals, setDeals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedDeal, setSelectedDeal] = useState(null);
  const [note, setNote] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(function() {
    supabase.from('deals').select('id, account_name, project_name, created_at').order('created_at', { ascending: false }).limit(50)
      .then(function(res) { setDeals(res.data || []); setLoading(false); });
  }, []);

  var filtered = deals.filter(function(d) {
    var name = (d.account_name || '') + ' ' + (d.project_name || '');
    return name.toLowerCase().includes(search.toLowerCase());
  });

  function handleLink() {
    if (!selectedDeal) return;
    setSaving(true);
    supabase.from('initiative_deal_links').insert([{ initiative_id: initiativeId, deal_id: selectedDeal.id, note: note || null, linked_by: currentUser.id }])
      .then(function(res) {
        if (res.error) { alert('Error linking deal: ' + res.error.message); setSaving(false); return; }
        onLinked();
      });
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal link-deal-modal" onClick={function(e) { e.stopPropagation(); }}>
        <div className="modal-header">
          <h2 className="modal-title">Link Deal</h2>
          <button className="btn-close-modal" onClick={onClose}>x</button>
        </div>
        <input className="deal-search-input" placeholder="Search deals..." value={search} onChange={function(e) { setSearch(e.target.value); }} />
        {loading ? <div className="loading"><span className="spinner"></span> Loading deals...</div> : (
          selectedDeal ? (
            <div>
              <div className="deal-option" style={{borderColor:'var(--accent)'}}>
                <div className="deal-option-name">{selectedDeal.account_name} — {selectedDeal.project_name}</div>
              </div>
              <input className="deal-note-input" placeholder="Add a note (optional)" value={note} onChange={function(e) { setNote(e.target.value); }} />
              <div className="modal-buttons">
                <button className="btn-secondary" onClick={function() { setSelectedDeal(null); }}>Back</button>
                <button className="btn-primary" onClick={handleLink} disabled={saving}>{saving ? 'Linking...' : 'Link Deal'}</button>
              </div>
            </div>
          ) : (
            <div className="deals-list">
              {filtered.length === 0 ? <div className="deals-empty">No deals found</div> : filtered.map(function(d) {
                return <button key={d.id} className="deal-option" onClick={function() { setSelectedDeal(d); }}>
                  <div className="deal-option-name">{d.account_name} — {d.project_name}</div>
                  <div className="deal-option-meta">Created {new Date(d.created_at).toLocaleDateString()}</div>
                </button>;
              })}
            </div>
          )
        )}
      </div>
    </div>
  );
}


function InitiativeModal({ initiative, onClose, onSave, currentUser, teamMembers }) {
  var isEdit = !!initiative;
  const [title, setTitle] = useState(initiative ? initiative.title : '');
  const [description, setDescription] = useState(initiative ? (initiative.description || '') : '');
  const [status, setStatus] = useState(initiative ? initiative.status : 'not_started');
  const [priority, setPriority] = useState(initiative ? initiative.priority : 'medium');
  const [targetDate, setTargetDate] = useState(initiative ? (initiative.target_date || '') : '');
  const [tagInput, setTagInput] = useState('');
  const [tags, setTags] = useState(initiative ? (initiative.tags || []) : []);
  const [owner, setOwner] = useState(initiative ? (initiative._owner || currentUser.id) : currentUser.id);
  const [contributors, setContributors] = useState(initiative ? (initiative._contributors || []) : []);
  const [watchers, setWatchers] = useState(initiative ? (initiative._watchers || []) : []);
  const [saving, setSaving] = useState(false);

  function addTag() {
    var t = tagInput.trim();
    if (t && !tags.includes(t)) { setTags(tags.concat([t])); }
    setTagInput('');
  }

  function handleTagKeyDown(e) {
    if (e.key === 'Enter') { e.preventDefault(); addTag(); }
  }

  function toggleMember(list, setList, id) {
    if (list.includes(id)) { setList(list.filter(function(x) { return x !== id; })); }
    else { setList(list.concat([id])); }
  }

  function handleSave() {
    if (!title.trim()) return;
    setSaving(true);
    var data = { title: title.trim(), description: description.trim() || null, status: status, priority: priority, tags: tags.length > 0 ? tags : null, target_date: targetDate || null };

    var promise;
    if (isEdit) {
      data.updated_at = new Date().toISOString();
      promise = supabase.from('initiatives').update(data).eq('id', initiative.id);
    } else {
      data.created_by = currentUser.id;
      promise = supabase.from('initiatives').insert([data]).select();
    }

    promise.then(function(res) {
      if (res.error) { alert('Error: ' + res.error.message); setSaving(false); return; }
      var initId = isEdit ? initiative.id : res.data[0].id;
      var memberOps = [];
      if (!isEdit) {
        memberOps.push(supabase.from('initiative_members').upsert([{ initiative_id: initId, user_id: owner, role: 'owner' }], { onConflict: 'initiative_id,user_id' }));
      } else {
        memberOps.push(supabase.from('initiative_members').delete().eq('initiative_id', initId));
        memberOps.push(Promise.resolve().then(function() {
          var members = [{ initiative_id: initId, user_id: owner, role: 'owner' }];
          contributors.forEach(function(uid) { if (uid !== owner) members.push({ initiative_id: initId, user_id: uid, role: 'contributor' }); });
          watchers.forEach(function(uid) { if (uid !== owner && !contributors.includes(uid)) members.push({ initiative_id: initId, user_id: uid, role: 'watcher' }); });
          return supabase.from('initiative_members').insert(members);
        }));
      }
      if (!isEdit) {
        var members = [];
        contributors.forEach(function(uid) { if (uid !== owner) members.push({ initiative_id: initId, user_id: uid, role: 'contributor' }); });
        watchers.forEach(function(uid) { if (uid !== owner && !contributors.includes(uid)) members.push({ initiative_id: initId, user_id: uid, role: 'watcher' }); });
        if (members.length > 0) memberOps.push(supabase.from('initiative_members').insert(members));
      }
      Promise.all(memberOps).then(function() { onSave(); });
    });
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={function(e) { e.stopPropagation(); }}>
        <div className="modal-header">
          <h2 className="modal-title">{isEdit ? 'Edit Initiative' : 'New Initiative'}</h2>
          <button className="btn-close-modal" onClick={onClose}>x</button>
        </div>
        <div className="form-group">
          <label className="form-label">Title *</label>
          <input className="form-input" placeholder="Initiative title" value={title} onChange={function(e) { setTitle(e.target.value); }} />
        </div>
        <div className="form-group">
          <label className="form-label">Description</label>
          <textarea className="form-textarea" placeholder="Describe this initiative..." value={description} onChange={function(e) { setDescription(e.target.value); }} />
        </div>
        <div style={{display:'flex', gap:'1rem', flexWrap:'wrap'}}>
          <div className="form-group" style={{flex:1, minWidth:'150px'}}>
            <label className="form-label">Status</label>
            <select className="form-select" value={status} onChange={function(e) { setStatus(e.target.value); }}>
              <option value="not_started">Not Started</option>
              <option value="in_progress">In Progress</option>
              <option value="on_hold">On Hold</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div className="form-group" style={{flex:1, minWidth:'150px'}}>
            <label className="form-label">Priority</label>
            <select className="form-select" value={priority} onChange={function(e) { setPriority(e.target.value); }}>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Target Date</label>
          <input className="form-input" type="date" value={targetDate} onChange={function(e) { setTargetDate(e.target.value); }} />
        </div>
        <div className="form-group">
          <label className="form-label">Tags</label>
          <div className="tags-input-container">
            <div className="tags-display">
              {tags.map(function(tag, i) { return <span key={i} className="tag-display">{tag} <span className="tag-remove" onClick={function() { setTags(tags.filter(function(t) { return t !== tag; })); }}>x</span></span>; })}
            </div>
            <input className="form-input" placeholder="Type a tag and press Enter" value={tagInput} onChange={function(e) { setTagInput(e.target.value); }} onKeyDown={handleTagKeyDown} />
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Owner</label>
          <select className="form-select" value={owner} onChange={function(e) { setOwner(e.target.value); }}>
            {teamMembers.map(function(m) { return <option key={m.id} value={m.id}>{m.display_name}</option>; })}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Contributors</label>
          <div className="form-checkbox-group">
            {teamMembers.filter(function(m) { return m.id !== owner; }).map(function(m) {
              return <div key={m.id} className="form-checkbox">
                <input type="checkbox" id={'contrib-'+m.id} checked={contributors.includes(m.id)} onChange={function() { toggleMember(contributors, setContributors, m.id); }} />
                <label htmlFor={'contrib-'+m.id}>{m.display_name}</label>
              </div>;
            })}
          </div>
        </div>
        <div className="modal-buttons">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={handleSave} disabled={!title.trim() || saving}>{saving ? 'Saving...' : (isEdit ? 'Save Changes' : 'Create Initiative')}</button>
        </div>
      </div>
    </div>
  );
}


function InitiativeDetail({ initiative, ownerName, contributorCount, onBack, onUpdate, onEdit, currentUser, teamMembers }) {
  const [updates, setUpdates] = useState([]);
  const [members, setMembers] = useState([]);
  const [linkedDeals, setLinkedDeals] = useState([]);
  const [newUpdate, setNewUpdate] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [showLinkDeal, setShowLinkDeal] = useState(false);
  var [showCopiedI, setShowCopiedI] = useState(false);
  var copyInitiativeLink = function() {
    var url = window.location.origin + window.location.pathname + '#initiative/' + initiative.id;
    navigator.clipboard.writeText(url).then(function() { setShowCopiedI(true); setTimeout(function() { setShowCopiedI(false); }, 2000); });
  };
  const statusLabels = { not_started: 'Not Started', in_progress: 'In Progress', on_hold: 'On Hold', done: 'Done' };

  useEffect(function() {
    supabase.from('initiative_updates').select('*').eq('initiative_id', initiative.id).order('created_at', { ascending: false })
      .then(function(res) { setUpdates(res.data || []); });
    supabase.from('initiative_members').select('*').eq('initiative_id', initiative.id)
      .then(function(res) { setMembers(res.data || []); });
    supabase.from('initiative_deal_links').select('*, deals(id, account_name, project_name)').eq('initiative_id', initiative.id).order('linked_at', { ascending: false })
      .then(function(res) { setLinkedDeals(res.data || []); });
  }, [initiative.id]);

  function submitUpdate() {
    if (!newUpdate.trim()) return;
    setSubmitting(true);
    supabase.from('initiative_updates').insert([{ initiative_id: initiative.id, author_id: currentUser.id, content: newUpdate.trim() }]).select()
      .then(function(res) {
        if (res.error) { alert('Error: ' + res.error.message); setSubmitting(false); return; }
        setUpdates([res.data[0]].concat(updates));
        setNewUpdate('');
        setSubmitting(false);
      });
  }

  function unlinkDeal(linkId) {
    if (!confirm('Unlink this deal?')) return;
    supabase.from('initiative_deal_links').delete().eq('id', linkId)
      .then(function() { setLinkedDeals(linkedDeals.filter(function(d) { return d.id !== linkId; })); });
  }

  function getMemberName(userId) {
    var m = teamMembers.find(function(t) { return t.id === userId; });
    return m ? m.display_name : 'Unknown';
  }

  function getInitials(userId) {
    var name = getMemberName(userId);
    return name.split(' ').map(function(n) { return n[0]; }).join('').substring(0, 2).toUpperCase();
  }

  return (
    <div className="initiative-detail">
      <div className="detail-header">
        <button className="detail-back-button" onClick={onBack}>Back</button>
        <div className="detail-title-section">
          <h1 className="detail-title">{initiative.title}</h1>
          <div className="detail-meta">
            <span className={'detail-badge ' + initiative.status}>{statusLabels[initiative.status]}</span>
            <div className="card-priority"><span className={'priority-dot ' + initiative.priority}></span><span>{initiative.priority} priority</span></div>
            {initiative.target_date && <span className="card-target-date">Target: {new Date(initiative.target_date).toLocaleDateString()}</span>}
          </div>
        </div>
        <div className="detail-actions">
          <button className="btn-edit" onClick={onEdit}>Edit</button>
          <button className="btn-edit" onClick={copyInitiativeLink} style={{marginLeft:"0.5rem"}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Share
          </button>
        </div>
        {showCopiedI && <div className="share-copied" style={{position:"absolute",top:"1rem",right:"2rem",background:"var(--accent)",color:"white",padding:"0.5rem 1rem",borderRadius:"8px",fontSize:"0.85rem",zIndex:10}}>Link copied to clipboard</div>}
      </div>

      <div className="detail-section">
        <h3 className="section-title">Description</h3>
        {initiative.description ? <p className="detail-description">{initiative.description}</p> : <p className="detail-empty">No description provided</p>}
      </div>

      {initiative.tags && initiative.tags.length > 0 && (
        <div className="detail-section">
          <h3 className="section-title">Tags</h3>
          <div className="card-tags">{initiative.tags.map(function(tag, i) { return <span key={i} className="tag-pill">{tag}</span>; })}</div>
        </div>
      )}

      <div className="detail-section">
        <h3 className="section-title">Team ({members.length})</h3>
        {members.length > 0 ? (
          <div className="members-list">
            {members.map(function(m) {
              return <div key={m.id} className="member-item">
                <span className="member-role">{m.role}</span>
                <span className="member-name">{getMemberName(m.user_id)}</span>
              </div>;
            })}
          </div>
        ) : <p className="detail-empty">No team members assigned</p>}
      </div>

      <div className="detail-section">
        <h3 className="section-title">Linked Deals ({linkedDeals.length})</h3>
        {linkedDeals.length > 0 && (
          <div className="linked-deals-list">
            {linkedDeals.map(function(link) {
              var dealName = link.deals ? (link.deals.account_name + ' — ' + link.deals.project_name) : 'Unknown Deal';
              return <div key={link.id} className="linked-deal-item">
                <div className="deal-info">
                  <div className="deal-name">{dealName}</div>
                  {link.note && <div className="deal-note">{link.note}</div>}
                  <div className="deal-date">Linked {new Date(link.linked_at).toLocaleDateString()}</div>
                </div>
                <button className="btn-unlink" onClick={function() { unlinkDeal(link.id); }}>Unlink</button>
              </div>;
            })}
          </div>
        )}
        <button className="btn-link-deals" onClick={function() { setShowLinkDeal(true); }} style={{marginTop:'1rem'}}>+ Link a Deal</button>
        {showLinkDeal && <LinkDealModal currentUser={currentUser} initiativeId={initiative.id} onClose={function() { setShowLinkDeal(false); }} onLinked={function() { setShowLinkDeal(false); supabase.from('initiative_deal_links').select('*, deals(id, account_name, project_name)').eq('initiative_id', initiative.id).order('linked_at', {ascending:false}).then(function(r) { setLinkedDeals(r.data||[]); }); }} />}
      </div>

      <div className="detail-section">
        <h3 className="section-title">Activity ({updates.length})</h3>
        <div className="activity-input-area">
          <textarea className="activity-textarea" placeholder="Post an update..." value={newUpdate} onChange={function(e) { setNewUpdate(e.target.value); }} />
          <div className="activity-button-group">
            <button className="btn-submit-activity" onClick={submitUpdate} disabled={!newUpdate.trim() || submitting}>{submitting ? 'Posting...' : 'Post Update'}</button>
          </div>
        </div>
        {updates.length > 0 && (
          <div className="initiative-activity" style={{marginTop:'1rem'}}>
            {updates.map(function(u) {
              return <div key={u.id} className="activity-item">
                <div className="activity-avatar">{getInitials(u.author_id)}</div>
                <div className="activity-content">
                  <span className="activity-author">{getMemberName(u.author_id)}</span>
                  <span className="activity-time">{new Date(u.created_at).toLocaleString()}</span>
                  <p className="activity-message">{u.content}</p>
                </div>
              </div>;
            })}
          </div>
        )}
      </div>
    </div>
  );
}


function InitiativesScreen({currentUser, initialInitiativeId, onClearSelId}) {
    var [teamMembers, setTeamMembers] = useState([]);
    var [appUsers, setAppUsers] = useState([]);
    useEffect(function() {
      supabase.from('team_members').select('*').then(function(res) { if (res.data) setTeamMembers(res.data); });
      supabase.from('app_users').select('id,display_name').then(function(res) { if (res.data) setAppUsers(res.data); });
    }, []);

  const [initiatives, setInitiatives] = useState([]);
  const [members, setMembers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [statusFilter, setStatusFilter] = useState('all');
  const [priorityFilter, setPriorityFilter] = useState('all');
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedInitiative, setSelectedInitiative] = useState(initialInitiativeId || null);
  useEffect(function() {
    if (selectedInitiative) {
      window.history.pushState(null, '', '#initiative/' + selectedInitiative);
    } else if (!initialInitiativeId) {
      window.history.pushState(null, '', '#initiatives');
    }
  }, [selectedInitiative]);
  const [showModal, setShowModal] = useState(false);
  const [editInitiative, setEditInitiative] = useState(null);

  var loadData = useCallback(function() {
    setLoading(true);
    Promise.all([
      supabase.from('initiatives').select('*').order('created_at', { ascending: false }),
      supabase.from('initiative_members').select('*')
    ]).then(function(results) {
      if (results[0].error) { setError(results[0].error.message); setLoading(false); return; }
      setInitiatives(results[0].data || []);
      setMembers(results[1].data || []);
      setLoading(false);
    });
  }, []);

  useEffect(function() { loadData(); }, [loadData]);

  function getOwnerName(initiativeId) {
    var ownerMember = members.find(function(m) { return m.initiative_id === initiativeId && m.role === 'owner'; });
    if (!ownerMember) return 'Unassigned';
    var tm = teamMembers.find(function(t) { return t.id === ownerMember.user_id; });
    if (tm) return tm.display_name;
    var au = appUsers.find(function(u) { return u.id === ownerMember.user_id; });
    return au ? au.display_name : 'Unknown';
  }

  function getContributorCount(initiativeId) {
    return members.filter(function(m) { return m.initiative_id === initiativeId; }).length;
  }

  var filtered = useMemo(function() {
    return initiatives.filter(function(i) {
      if (statusFilter !== 'all' && i.status !== statusFilter) return false;
      if (priorityFilter !== 'all' && i.priority !== priorityFilter) return false;
      if (searchQuery) {
        var q = searchQuery.toLowerCase();
        var match = (i.title || '').toLowerCase().includes(q) || (i.description || '').toLowerCase().includes(q);
        if (!match && i.tags) match = i.tags.some(function(t) { return t.toLowerCase().includes(q); });
        if (!match) return false;
      }
      return true;
    });
  }, [initiatives, statusFilter, priorityFilter, searchQuery]);

  var stats = useMemo(function() {
    return {
      total: initiatives.length,
      in_progress: initiatives.filter(function(i) { return i.status === 'in_progress'; }).length,
      on_hold: initiatives.filter(function(i) { return i.status === 'on_hold'; }).length,
      done: initiatives.filter(function(i) { return i.status === 'done'; }).length,
      not_started: initiatives.filter(function(i) { return i.status === 'not_started'; }).length
    };
  }, [initiatives]);

  if (selectedInitiative) {
    var init = initiatives.find(function(i) { return i.id === selectedInitiative; });
    if (!init && initiatives.length > 0) { setSelectedInitiative(null); return null; }
    if (!init) return React.createElement("div", {style:{padding:"2rem",color:"var(--text-muted)",textAlign:"center"}}, "Loading initiative...");
    return <InitiativeDetail
      currentUser={currentUser}
    teamMembers={teamMembers}
                  initiative={init}
      ownerName={getOwnerName(init.id)}
      contributorCount={getContributorCount(init.id)}
      onBack={function() { setSelectedInitiative(null); }}
      onUpdate={loadData}
      onEdit={function() { setEditInitiative(init); setShowModal(true); setSelectedInitiative(null); }}
    />;
  }

  return (
    <div className="initiatives-screen">
      <div className="initiatives-breadcrumb"><a onClick={function(){ window.location.hash = 'board'; }}>← Sales Control Room</a></div>
      <div className="initiatives-header">
        <h1>Initiatives</h1>
        <div className="initiatives-header-actions">
          <button className="btn-new-initiative" onClick={function() { setEditInitiative(null); setShowModal(true); }}>+ New Initiative</button>
        </div>
      </div>

      <div className="initiatives-filters">
        <div className="filter-group">
          <span className="filter-label">Status</span>
          <div className="filter-pills">
            {['all','not_started','in_progress','on_hold','done'].map(function(s) {
              var label = s === 'all' ? 'All' : s === 'not_started' ? 'Not Started' : s === 'in_progress' ? 'In Progress' : s === 'on_hold' ? 'On Hold' : 'Done';
              return <button key={s} className={'filter-pill' + (statusFilter === s ? ' active' : '')} onClick={function() { setStatusFilter(s); }}>{label}</button>;
            })}
          </div>
        </div>
        <div className="filter-group">
          <span className="filter-label">Priority</span>
          <div className="filter-pills priority-filter">
            {['all','low','medium','high'].map(function(p) {
              return <button key={p} className={'filter-pill' + (priorityFilter === p ? ' active' : '')} onClick={function() { setPriorityFilter(p); }}>
                {p !== 'all' && <span className={'priority-dot ' + p}></span>}
                {p === 'all' ? 'All' : p.charAt(0).toUpperCase() + p.slice(1)}
              </button>;
            })}
          </div>
        </div>
        <input className="initiatives-search" placeholder="Search initiatives..." value={searchQuery} onChange={function(e) { setSearchQuery(e.target.value); }} />
      </div>

      <div className="initiatives-stats">
        <div className="stat-card"><div className="stat-label">Total</div><div className="stat-value">{stats.total}</div></div>
        <div className="stat-card"><div className="stat-label">In Progress</div><div className="stat-value">{stats.in_progress}</div></div>
        <div className="stat-card"><div className="stat-label">On Hold</div><div className="stat-value">{stats.on_hold}</div></div>
        <div className="stat-card"><div className="stat-label">Done</div><div className="stat-value">{stats.done}</div></div>
        <div className="stat-card muted"><div className="stat-label">Not Started</div><div className="stat-value">{stats.not_started}</div></div>
      </div>

      {loading ? <div className="loading"><span className="spinner"></span> Loading initiatives...</div> : error ? <div className="error-message">{error}</div> : filtered.length === 0 ? (
        <div className="initiatives-empty">
          <h3>{initiatives.length === 0 ? 'No initiatives yet' : 'No matching initiatives'}</h3>
          <p>{initiatives.length === 0 ? 'Create your first initiative to start tracking strategic projects.' : 'Try adjusting your filters or search query.'}</p>
          {initiatives.length === 0 && <button className="btn-new-initiative" onClick={function() { setEditInitiative(null); setShowModal(true); }}>+ Create Initiative</button>}
        </div>
      ) : (
        <div className="initiatives-grid">
          {filtered.map(function(init) {
            return <InitiativeCard key={init.id} initiative={init} ownerName={getOwnerName(init.id)} contributorCount={getContributorCount(init.id)} onClick={function() { setSelectedInitiative(init.id); }} />;
          })}
        </div>
      )}

      {showModal && <InitiativeModal currentUser={currentUser}
    teamMembers={teamMembers} initiative={editInitiative} onClose={function() { setShowModal(false); setEditInitiative(null); }} onSave={function() { setShowModal(false); setEditInitiative(null); loadData(); }} />}
    </div>
  );
}

function ClosingZone({ deals, teamMembers, user, onDealClick }) {
  // Detect board mode from URL: #closing?board=1 or ?board=1 in query
  const isBoardMode = React.useMemo(() => {
    if (typeof window === 'undefined') return false;
    const hash = window.location.hash || '';
    const search = window.location.search || '';
    return /[?&]board=1\b/.test(hash) || /[?&]board=1\b/.test(search);
  }, []);

  // Map logged-in user to their team_member.id (if they are one)
  const myTeamMemberId = React.useMemo(() => {
    if (!user || !teamMembers) return null;
    const tm = teamMembers.find(t => t.user_id === user.id);
    return tm ? tm.id : null;
  }, [user, teamMembers]);

  const tm = React.useMemo(() => Object.fromEntries((teamMembers||[]).map(m => [m.id, m])), [teamMembers]);

  const commercial = React.useMemo(() =>
    (deals||[]).filter(d => (d.stage === 'procurement' || d.stage === 'proposal') && d.status !== 'lost' && d.status !== 'won')
  , [deals]);

  // Does the user own any commercial deals? If yes, default to "My deals".
  const userOwnsCommercial = React.useMemo(() =>
    !!myTeamMemberId && commercial.some(d => d.deal_owner_id === myTeamMemberId)
  , [myTeamMemberId, commercial]);

  const [scopeFilter, setScopeFilter] = React.useState('all'); // 'mine' | 'all'
  React.useEffect(() => { if (userOwnsCommercial) setScopeFilter('mine'); }, [userOwnsCommercial]);

  const [regionFilter, setRegionFilter] = React.useState('all');

  const regions = React.useMemo(() => [...new Set(commercial.map(d => d.region).filter(Boolean))], [commercial]);

  const filtered = commercial.filter(d =>
    (scopeFilter === 'all' || (scopeFilter === 'mine' && d.deal_owner_id === myTeamMemberId)) &&
    (regionFilter === 'all' || d.region === regionFilter)
  );

  const procurement = filtered.filter(d => d.stage === 'procurement').sort((a,b) => (b.deal_value||0) - (a.deal_value||0));
  const proposal = filtered.filter(d => d.stage === 'proposal').sort((a,b) => (b.deal_value||0) - (a.deal_value||0));
  const procValue = procurement.reduce((s,d) => s + (d.deal_value||0), 0);
  const propValue = proposal.reduce((s,d) => s + (d.deal_value||0), 0);
  const totalCommercialValue = procValue + propValue;

  const recentMoves = filtered.filter(d => {
    if (!d.stage_entered_at) return false;
    const days = Math.floor((Date.now() - new Date(d.stage_entered_at)) / 86400000);
    return days <= 7;
  }).sort((a,b) => new Date(b.stage_entered_at) - new Date(a.stage_entered_at));

  const fmtDays = (n) => n === 0 ? 'today' : n === 1 ? 'yesterday' : `${n}d ago`;

  const stageBenchmark = (stage, days) => {
    if (days == null) return null;
    if (stage === 'procurement') return days <= 21 ? 'on-track' : 'stretching';
    if (stage === 'proposal') return days <= 30 ? 'on-track' : 'stretching';
    return null;
  };

  // Copy Briefing — generates a plain-text summary
  const [copied, setCopied] = React.useState(false);
  const copyBriefing = () => {
    const today = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    const lines = [
      `Commercial pipeline snapshot · ${today}`,
      ``,
      `${fmt(procValue)} close to closing across ${procurement.length} ${procurement.length===1?'account':'accounts'} in Procurement.`,
      `${fmt(propValue)} in active commercial negotiation across ${proposal.length} ${proposal.length===1?'account':'accounts'} at Proposal.`,
      `Total commercial pipeline: ${fmt(totalCommercialValue)}.`,
      ``,
    ];
    if (procurement.length > 0) {
      lines.push(`In Procurement:`);
      procurement.forEach(d => { lines.push(`  • ${d.account_name} — ${fmt(d.deal_value, d.deal_value_note)}`); });
      lines.push(``);
    }
    if (recentMoves.length > 0) {
      lines.push(`Moved this week:`);
      recentMoves.slice(0, 5).forEach(d => {
        const days = Math.floor((Date.now() - new Date(d.stage_entered_at)) / 86400000);
        const stageInfo = STAGE_MAP[d.stage];
        lines.push(`  • ${d.account_name} → ${stageInfo?.label} (${fmtDays(days)})`);
      });
    }
    const text = lines.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
    }
  };

  const ProcurementCard = ({ d }) => {
    const owner = tm[d.deal_owner_id];
    const daysInStage = d.stage_entered_at ? Math.floor((Date.now() - new Date(d.stage_entered_at)) / 86400000) : null;
    const daysSinceActivity = d.last_activity_date ? Math.floor((Date.now() - new Date(d.last_activity_date)) / 86400000) : null;
    const benchmark = stageBenchmark('procurement', daysInStage);
    return (
      <div className="cz-hero-card" onClick={() => onDealClick(d.id)}>
        <div className="cz-hero-top">
          <div className="cz-hero-account-block">
            <div className="cz-hero-account">{d.account_name}</div>
            <div className="cz-hero-project">{d.project_name}</div>
          </div>
          <div className="cz-hero-value">{fmt(d.deal_value, d.deal_value_note)}</div>
        </div>
        <div className="cz-hero-facts">
          {daysInStage !== null && (
            <div className={`cz-fact cz-fact-${benchmark||''}`}>
              <span className="cz-fact-label">In Procurement</span>
              <span className="cz-fact-value">{daysInStage}d {benchmark === 'stretching' && '· stretching'}{benchmark === 'on-track' && '· on track'}</span>
            </div>
          )}
          {daysSinceActivity !== null && (
            <div className="cz-fact">
              <span className="cz-fact-label">Last activity</span>
              <span className="cz-fact-value">{fmtDays(daysSinceActivity)}</span>
            </div>
          )}
          <div className="cz-fact">
            <span className="cz-fact-label">Champion</span>
            <span className="cz-fact-value">{d.champion_name || '—'}</span>
          </div>
          {owner && (
            <div className="cz-fact">
              <span className="cz-fact-label">Owner</span>
              <span className="cz-fact-value">{owner.display_name}</span>
            </div>
          )}
        </div>
        {d.next_action && (
          <div className="cz-hero-action">
            <span className="cz-hero-action-arrow">›</span>
            <span>{d.next_action}</span>
          </div>
        )}
      </div>
    );
  };

  const ProposalRow = ({ d }) => {
    const owner = tm[d.deal_owner_id];
    const daysInStage = d.stage_entered_at ? Math.floor((Date.now() - new Date(d.stage_entered_at)) / 86400000) : null;
    const daysSinceActivity = d.last_activity_date ? Math.floor((Date.now() - new Date(d.last_activity_date)) / 86400000) : null;
    return (
      <div className="cz-row" onClick={() => onDealClick(d.id)}>
        <div className="cz-row-account">
          <div className="cz-row-name">{d.account_name}</div>
          <div className="cz-row-project">{d.project_name}</div>
        </div>
        <div className="cz-row-value">{fmt(d.deal_value, d.deal_value_note)}</div>
        <div className="cz-row-meta">
          {daysInStage !== null && <span>{daysInStage}d in stage</span>}
          {daysSinceActivity !== null && <span>· last activity {fmtDays(daysSinceActivity)}</span>}
          {d.champion_name && <span>· {d.champion_name}</span>}
          {owner && <span className="cz-row-owner">{owner.display_name}</span>}
        </div>
      </div>
    );
  };

  return (
    <div className={"closing-zone" + (isBoardMode ? " cz-board-mode" : "")}>
      {/* Top bar: filters + copy briefing (hidden in board mode) */}
      {!isBoardMode && (
        <div className="cz-topbar">
          <div className="cz-filters">
            {myTeamMemberId && (
              <div className="cz-toggle">
                <button className={`cz-toggle-btn ${scopeFilter==='mine'?'active':''}`} onClick={() => setScopeFilter('mine')}>My deals</button>
                <button className={`cz-toggle-btn ${scopeFilter==='all'?'active':''}`} onClick={() => setScopeFilter('all')}>All deals</button>
              </div>
            )}
            <select className="cz-select" value={regionFilter} onChange={e => setRegionFilter(e.target.value)}>
              <option value="all">All regions</option>
              {regions.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
          </div>
          <button className="cz-copy-btn" onClick={copyBriefing}>
            {copied ? '✓ Copied' : '📋 Copy briefing'}
          </button>
        </div>
      )}

      {/* Headline — money first */}
      <div className="cz-headline-card">
        <div className="cz-headline-money">{fmt(procValue)}</div>
        <div className="cz-headline-copy">
          <div className="cz-headline-title">close to closing across <strong>{procurement.length}</strong> {procurement.length === 1 ? 'account' : 'accounts'}</div>
          <div className="cz-headline-sub">Currently in Procurement — contracts being finalised</div>
        </div>
        <div className="cz-headline-divider"></div>
        <div className="cz-headline-secondary">
          <div className="cz-headline-sec-money">{fmt(propValue)}</div>
          <div className="cz-headline-sec-copy">in active commercial negotiation · <strong>{proposal.length}</strong> {proposal.length === 1 ? 'account' : 'accounts'} at Proposal</div>
        </div>
        <div className="cz-headline-total">Total commercial pipeline: <strong>{fmt(totalCommercialValue)}</strong></div>
      </div>

      {/* What changed — hidden in board mode */}
      {!isBoardMode && (
        <div className="cz-whatchanged">
          <div className="cz-whatchanged-header">
            <h3 className="cz-whatchanged-title">What changed this week</h3>
            <span className="cz-whatchanged-count">{recentMoves.length} {recentMoves.length === 1 ? 'movement' : 'movements'} in the last 7 days</span>
          </div>
          {recentMoves.length === 0 ? (
            <div className="cz-whatchanged-empty">No stage movements in commercial territory this week.</div>
          ) : (
            <div className="cz-whatchanged-list">
              {recentMoves.map(d => {
                const days = Math.floor((Date.now() - new Date(d.stage_entered_at)) / 86400000);
                const stageInfo = STAGE_MAP[d.stage];
                return (
                  <div key={d.id} className="cz-whatchanged-item" onClick={() => onDealClick(d.id)}>
                    <div className="cz-whatchanged-dot" style={{background:stageInfo?.color}}></div>
                    <div className="cz-whatchanged-body">
                      <div className="cz-whatchanged-text"><strong>{d.account_name}</strong> entered {stageInfo?.label}</div>
                      <div className="cz-whatchanged-when">{fmtDays(days)} · {fmt(d.deal_value, d.deal_value_note)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Procurement — hero section (always shown) */}
      <div className="cz-hero-section">
        <div className="cz-hero-section-header">
          <h3 className="cz-hero-section-title">Close to closing · Procurement</h3>
          <span className="cz-hero-section-count">{procurement.length} {procurement.length === 1 ? 'deal' : 'deals'} · {fmt(procValue)}</span>
        </div>
        {procurement.length === 0 ? (
          <div className="cz-empty">No deals in Procurement right now.</div>
        ) : (
          <div className="cz-hero-grid">{procurement.map(d => <ProcurementCard key={d.id} d={d} />)}</div>
        )}
      </div>

      {/* Proposal — hidden in board mode */}
      {!isBoardMode && (
        <div className="cz-sub-section">
          <div className="cz-sub-section-header">
            <h4 className="cz-sub-section-title">Behind them · Proposal</h4>
            <span className="cz-sub-section-count">{proposal.length} {proposal.length === 1 ? 'deal' : 'deals'} · {fmt(propValue)}</span>
          </div>
          {proposal.length === 0 ? (
            <div className="cz-empty">No deals in Proposal right now.</div>
          ) : (
            <div className="cz-rows">{proposal.map(d => <ProposalRow key={d.id} d={d} />)}</div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  // Auth & User Management
  const [user, setUser] = useState(null);
  const [sessionLoading, setSessionLoading] = useState(true);
  const [appUsers, setAppUsers] = useState([]);
  const [auditLogs, setAuditLogs] = useState([]);

  // Dashboard State
  const [deals, setDeals] = useState([]);
  const [team, setTeam] = useState([]);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('board');
  const [view, setView] = useState('kanban');
  const [selId, setSelId] = useState(null);
  const [sel, setSel] = useState(null);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({});
  const [search, setSearch] = useState('');
  const [stageF, setStageF] = useState('all');
  const [regionF, setRegionF] = useState('all');
  const [statusF, setStatusF] = useState('all');
  const [selectedClient, setSelectedClient] = useState(null);
  const [toast, setToast] = useState(null);
  const [ts, setTs] = useState(new Date());

  // Hash-based routing for shareable URLs
  const buildHash = useCallback((p, v, dealId) => {
    if (p === 'account' && dealId) return '#deal/' + dealId;
    if (p === 'board') return '#board';
    if (p === 'closing') return '#closing';
    if (p === 'clients' && selectedClient) return '#client/' + encodeURIComponent(selectedClient);
    if (p === 'clients') return '#clients';
    if (p === 'initiatives' && dealId) return '#initiative/' + dealId;
    if (['audit','admin','initiatives'].includes(p)) return '#' + p;
    return '#board';
  }, [selectedClient]);

  const parseHash = useCallback(() => {
    const h = window.location.hash.replace(/^#\/?/, '');
    if (!h) return { page: 'board', view: 'kanban', dealId: null };
    if (h.startsWith('deal/')) {
      const id = h.slice(5);
      return { page: 'account', view: 'kanban', dealId: id || null };
    }
    if (h.startsWith('initiative/')) {
      const id = h.slice(11);
      return { page: 'initiatives', view: 'kanban', dealId: id || null };
    }
    if (h.startsWith('client/')) {
      const name = decodeURIComponent(h.slice(7));
      return { page: 'clients', view: 'kanban', dealId: null, clientName: name };
    }
    if (h === 'clients') return { page: 'clients', view: 'kanban', dealId: null };
    if (h === 'initiatives') return { page: 'initiatives', view: 'kanban', dealId: null };
    if (h === 'board') return { page: 'board', view: 'kanban', dealId: null };
    if (h === 'closing' || h.startsWith('closing?')) return { page: 'closing', view: 'kanban', dealId: null };
    if (['audit','admin'].includes(h)) return { page: h, view: 'kanban', dealId: null };
    return { page: 'board', view: 'kanban', dealId: null };
  }, []);

  const initialMount = useRef(true);
  useEffect(() => {
    if (initialMount.current) return;
    const newHash = buildHash(page, view, selId);
    if (window.location.hash !== newHash) {
      window.history.pushState(null, '', newHash);
    }
  }, [page, view, selId, buildHash]);

  useEffect(() => {
    const onHashChange = () => {
      const parsed = parseHash();
      setPage(parsed.page);
      setView(parsed.view);
      if (parsed.dealId) setSelId(parsed.dealId);
      else setSelId(null);
      if (parsed.clientName) setSelectedClient(parsed.clientName);
      else if (parsed.page !== 'clients') setSelectedClient(null);
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, [parseHash]);

  // Check for existing session on mount
  useEffect(() => {
    const saved = localStorage.getItem('controlroom_session');
    if (saved) {
      try {
        const sess = JSON.parse(saved);
        setUser(sess);
      } catch (e) {
        localStorage.removeItem('controlroom_session');
      }
    }
    setSessionLoading(false);

    const parsed = parseHash();
    if (window.location.hash) {
      setPage(parsed.page);
      setView(parsed.view);
      if (parsed.dealId) setSelId(parsed.dealId);
      if (parsed.clientName) setSelectedClient(parsed.clientName);
    }
    setTimeout(() => { initialMount.current = false; }, 100);
  }, []);

  // Handle login
  const handleLogin = (userData) => {
    setUser(userData);
    setPage('board');
  };

  // Handle logout
  const handleLogout = () => {
    localStorage.removeItem('controlroom_session');
    setUser(null);
    setAuditLogs([]);
    setAppUsers([]);
    logAudit(user, 'logout', 'user', user?.id, user?.email);
  };

  // Check if user can access a screen
  const canAccessScreen = (screenName) => {
    if (!user) return false;
    if (user.role === 'admin') return true;
    return user.screens && user.screens.includes(screenName);
  };

  // Check if user can edit
  const canEdit = user && (user.role === 'admin' || user.role === 'editor');

  // Load audit logs when page is set to 'audit'
  useEffect(() => {
    if (page === 'audit' && user) {
      fetchAuditLog(200).then(logs => setAuditLogs(logs));
    }
  }, [page, user]);

  // Load app users when page is set to 'admin'
  useEffect(() => {
    if (page === 'admin' && user) {
      fetchAppUsers().then(users => setAppUsers(users));
    }
  }, [page, user]);

  const load = useCallback(async () => {
    setLoading(true);
    const [d, t] = await Promise.all([
      supabase.from('deals').select('*').order('stage_entered_at', {ascending:false}),
      supabase.from('team_members').select('*'),
    ]);
    if (d.data) setDeals(d.data);
    if (t.data) setTeam(t.data);
    setLoading(false);
    setTs(new Date());
  }, []);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    const ch = supabase.channel('deals-rt')
      .on('postgres_changes', { event:'*', schema:'public', table:'deals' }, p => {
        if (p.eventType === 'UPDATE') setDeals(prev => prev.map(d => d.id === p.new.id ? p.new : d));
        else if (p.eventType === 'INSERT') setDeals(prev => [...prev, p.new]);
      }).subscribe();
    return () => supabase.removeChannel(ch);
  }, []);

  const tm = useMemo(() => Object.fromEntries(team.map(t => [t.id, t])), [team]);

  const filtered = useMemo(() => deals.filter(d => {
    if (search) {
      const s = search.toLowerCase();
      if (!(d.account_name||'').toLowerCase().includes(s) && !(d.project_name||'').toLowerCase().includes(s) && !(d.champion_name||'').toLowerCase().includes(s)) return false;
    }
    if (stageF !== 'all' && d.stage !== stageF) return false;
    if (regionF !== 'all' && d.region !== regionF) return false;
    if (statusF === 'stalled' && d.status !== 'stalled') return false;
    if (statusF === 'overdue' && !(daysUntil(d.next_action_due) < 0 && d.status === 'active')) return false;
    return true;
  }), [deals, search, stageF, regionF, statusF]);

  const stats = useMemo(() => {
    const active = deals.filter(d => d.status === 'active');
    const stalled = deals.filter(d => d.status === 'stalled');
    const overdue = deals.filter(d => daysUntil(d.next_action_due) < 0 && d.status === 'active');
    const val = active.reduce((s, d) => s + (d.deal_value || 0), 0);
    const w = active.reduce((s, d) => {
      const m = {intro:0.05,discovery:0.15,poc:0.3,proposal:0.5,procurement:0.75,contract_signed:1};
      return s + (d.deal_value || 0) * (m[d.stage] || 0);
    }, 0);
    return { total:deals.length, active:active.length, stalled:stalled.length, overdue:overdue.length, val, w };
  }, [deals]);

  const regions = useMemo(() => [...new Set(deals.map(d => d.region).filter(Boolean))].sort(), [deals]);

  const flash = msg => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const save = async () => {
    if (!canEdit) {
      flash('You do not have permission to edit deals');
      return;
    }
    const u = {};
    ['stage','deal_owner_id','next_action','next_action_due','next_action_owner_id','champion_name','deal_value','status','stall_reason','notes','partner_id'].forEach(k => {
      if (form[k] !== undefined) u[k] = k === 'deal_value' ? (form[k] || null) : (k === 'partner_id' ? (form[k] || null) : form[k]);
    });
    const { error } = await supabase.from('deals').update(u).eq('id', sel.id);
    if (error) { flash('Error: ' + error.message); return; }

    // Log to audit trail
    const changes = {};
    Object.keys(u).forEach(k => {
      changes[k] = { before: sel[k], after: u[k] };
    });
    await logAudit(user, 'update_deal', 'deal', sel.id, sel.account_name, changes);

    setDeals(prev => prev.map(d => d.id === sel.id ? {...d, ...u} : d));
    setSel(prev => ({...prev, ...u}));
    setEditing(false);
    flash('Deal updated');
  };

  // Show login if no session
  if (sessionLoading) return (
    <div className="loading-screen">
      <div className="loading-spinner"></div>
      <div style={{color:'var(--text-muted)',fontSize:13,fontWeight:500}}>Loading…</div>
    </div>
  );

  if (!user) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  if (loading) return (
    <div className="loading-screen">
      <div className="loading-spinner"></div>
      <div style={{color:'var(--text-muted)',fontSize:13,fontWeight:500}}>Loading pipeline…</div>
    </div>
  );

  // Check audit screen access
  if (page === 'audit') {
    if (!canAccessScreen('audit')) {
      return (
        <div>
          <div className="header">
            <div className="header-left">
              <div className="logo"><img src={CONQUER_LOGO} alt="Conquer AI" /></div>
              <div className="logo-divider"></div>
              <span className="logo-product">Control Room</span>
            </div>
            <div className="header-right">
              <div className="user-badge">
                <span className="user-name">{user.name}</span>
                <span className="user-role">{user.role}</span>
              </div>
              <button className="logout-btn" onClick={handleLogout}>Logout</button>
            </div>
          </div>
          <div style={{padding:'40px',textAlign:'center',color:'var(--text-muted)'}}>Access denied. You do not have permission to view the audit log.</div>
        </div>
      );
    }
    return (
      <div>
        <div className="header">
          <div className="header-left">
            <div className="logo"><img src={CONQUER_LOGO} alt="Conquer AI" /></div>
            <div className="logo-divider"></div>
            <span className="logo-product">Control Room</span>
          </div>
          <div className="header-right">
            <div className="view-toggle">
              {canAccessScreen('board') && <button className={`view-btn ${page==='board'?'active':''}`} onClick={()=>{setPage('board');setView('kanban');}}>Board</button>}
              {canAccessScreen('board') && <button className={`view-btn ${page==='closing'?'active':''}`} onClick={()=>setPage('closing')} style={page==='closing'?{background:'var(--accent)',color:'white'}:{}}>Closing Zone</button>}
              {canAccessScreen('audit') && <button className={`view-btn ${page==='audit'?'active':''}`} onClick={()=>setPage('audit')} style={page==='audit'?{background:'var(--accent)',color:'white'}:{}}>Audit</button>}
              {canAccessScreen('admin') && <button className={`view-btn ${page==='admin'?'active':''}`} onClick={()=>setPage('admin')} style={page==='admin'?{background:'var(--accent)',color:'white'}:{}}>Admin</button>}
              <button className={`view-btn ${page==='initiatives'?'active':''}`} onClick={()=>setPage('initiatives')} style={page==='initiatives'?{background:'var(--accent)',color:'white'}:{}}>Initiatives</button>
              <button className={`view-btn ${page==='clients'?'active':''}`} onClick={()=>{setPage('clients');setSelectedClient(null);}} style={page==='clients'?{background:'var(--accent)',color:'white'}:{}}>Clients</button>
            </div>
            <button className="refresh-btn" onClick={load}>↻ Refresh</button>
            <span className="timestamp">{ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
            <div className="user-badge">
              <span className="user-name">{user.name}</span>
              <span className="user-role">{user.role}</span>
            </div>
            <button className="logout-btn" onClick={handleLogout}>Logout</button>
          </div>
        </div>
        <AuditLogView auditLogs={auditLogs} userRole={user.role} />
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  // Check admin screen access
  
      if (page === 'initiatives') { return (<InitiativesScreen currentUser={user} initialInitiativeId={selId} onClearSelId={function() { setSelId(null); }} />); }
      if (page === 'admin') {
    if (!canAccessScreen('admin')) {
      return (
        <div>
          <div className="header">
            <div className="header-left">
              <div className="logo"><img src={CONQUER_LOGO} alt="Conquer AI" /></div>
              <div className="logo-divider"></div>
              <span className="logo-product">Control Room</span>
            </div>
            <div className="header-right">
              <div className="user-badge">
                <span className="user-name">{user.name}</span>
                <span className="user-role">{user.role}</span>
              </div>
              <button className="logout-btn" onClick={handleLogout}>Logout</button>
            </div>
          </div>
          <div style={{padding:'40px',textAlign:'center',color:'var(--text-muted)'}}>Access denied. Admin role required.</div>
        </div>
      );
    }
    return (
      <div>
        <div className="header">
          <div className="header-left">
            <div className="logo"><img src={CONQUER_LOGO} alt="Conquer AI" /></div>
            <div className="logo-divider"></div>
            <span className="logo-product">Control Room</span>
          </div>
          <div className="header-right">
            <div className="view-toggle">
              {canAccessScreen('board') && <button className={`view-btn ${page==='board'?'active':''}`} onClick={()=>{setPage('board');setView('kanban');}}>Board</button>}
              {canAccessScreen('board') && <button className={`view-btn ${page==='closing'?'active':''}`} onClick={()=>setPage('closing')} style={page==='closing'?{background:'var(--accent)',color:'white'}:{}}>Closing Zone</button>}
              {canAccessScreen('audit') && <button className={`view-btn ${page==='audit'?'active':''}`} onClick={()=>setPage('audit')} style={page==='audit'?{background:'var(--accent)',color:'white'}:{}}>Audit</button>}
              {canAccessScreen('admin') && <button className={`view-btn ${page==='admin'?'active':''}`} onClick={()=>setPage('admin')} style={page==='admin'?{background:'var(--accent)',color:'white'}:{}}>Admin</button>}
              <button className={`view-btn ${page==='initiatives'?'active':''}`} onClick={()=>setPage('initiatives')} style={page==='initiatives'?{background:'var(--accent)',color:'white'}:{}}>Initiatives</button>
              <button className={`view-btn ${page==='clients'?'active':''}`} onClick={()=>{setPage('clients');setSelectedClient(null);}} style={page==='clients'?{background:'var(--accent)',color:'white'}:{}}>Clients</button>
            </div>
            <button className="refresh-btn" onClick={load}>↻ Refresh</button>
            <span className="timestamp">{ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
            <div className="user-badge">
              <span className="user-name">{user.name}</span>
              <span className="user-role">{user.role}</span>
            </div>
            <button className="logout-btn" onClick={handleLogout}>Logout</button>
          </div>
        </div>
        <AdminPanel users={appUsers} userRole={user.role} onUserUpdate={() => fetchAppUsers().then(setAppUsers)} />
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

    if (page === 'clients') {
    return (
      <div>
        <div className="header">
          <div className="header-left">
            <div className="logo"><img src={CONQUER_LOGO} alt="Conquer AI" /></div>
            <div className="logo-divider"></div>
            <span className="logo-product">Control Room</span>
          </div>
          <div className="header-right">
            <div className="view-toggle">
              {canAccessScreen('board') && <button className={`view-btn ${page==='board'?'active':''}`} onClick={()=>{setPage('board');setView('kanban');}}>Board</button>}
              {canAccessScreen('board') && <button className={`view-btn ${page==='closing'?'active':''}`} onClick={()=>setPage('closing')} style={page==='closing'?{background:'var(--accent)',color:'white'}:{}}>Closing Zone</button>}
              {canAccessScreen('audit') && <button className={`view-btn ${page==='audit'?'active':''}`} onClick={()=>setPage('audit')} style={page==='audit'?{background:'var(--accent)',color:'white'}:{}}>Audit</button>}
              {canAccessScreen('admin') && <button className={`view-btn ${page==='admin'?'active':''}`} onClick={()=>setPage('admin')} style={page==='admin'?{background:'var(--accent)',color:'white'}:{}}>Admin</button>}
              <button className={`view-btn ${page==='initiatives'?'active':''}`} onClick={()=>setPage('initiatives')} style={page==='initiatives'?{background:'var(--accent)',color:'white'}:{}}>Initiatives</button>
              <button className={`view-btn ${page==='clients'?'active':''}`} onClick={()=>{setPage('clients');setSelectedClient(null);}} style={page==='clients'?{background:'var(--accent)',color:'white'}:{}}>Clients</button>
            </div>
            <button className="refresh-btn" onClick={load}>↻ Refresh</button>
            <span className="timestamp">{ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
            <div className="user-badge">
              <span className="user-name">{user.name}</span>
              <span className="user-role">{user.role}</span>
            </div>
            <button className="logout-btn" onClick={handleLogout}>Logout</button>
          </div>
        </div>
        <ClientsPage
          deals={deals}
          teamMembers={team}
          onDealClick={(id) => { setSelId(id); setPage('account'); }}
          onClientClick={(name) => { setSelectedClient(name); window.history.pushState(null, '', '#client/' + encodeURIComponent(name)); }}
          selectedClient={selectedClient}
          onBack={() => { setSelectedClient(null); window.history.pushState(null, '', '#clients'); }}
        />
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  if (page === 'account') {
    return <AccountView dealId={selId} deals={deals} teamMembers={team} onBack={() => {setPage('board'); setSelId(null);}} canEdit={canEdit} user={user} />;
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <div className="logo"><img src={CONQUER_LOGO} alt="Conquer AI" /></div>
          <div className="logo-divider"></div>
          <span className="logo-product">Control Room</span>
        </div>
        <div className="header-right">
          <div className="view-toggle">
            {canAccessScreen('board') && <button className={`view-btn ${page==='board'&&view==='kanban'?'active':''}`} onClick={()=>{setPage('board');setView('kanban');}}>Board</button>}
            {canAccessScreen('board') && <button className={`view-btn ${page==='closing'?'active':''}`} onClick={()=>setPage('closing')} style={page==='closing'?{background:'var(--accent)',color:'white'}:{}}>Closing Zone</button>}
            {canAccessScreen('audit') && <button className={`view-btn ${page==='audit'?'active':''}`} onClick={()=>setPage('audit')} style={page==='audit'?{background:'var(--accent)',color:'white'}:{}}>Audit</button>}
            {canAccessScreen('admin') && <button className={`view-btn ${page==='admin'?'active':''}`} onClick={()=>setPage('admin')} style={page==='admin'?{background:'var(--accent)',color:'white'}:{}}>Admin</button>}
              <button className={`view-btn ${page==='initiatives'?'active':''}`} onClick={()=>setPage('initiatives')} style={page==='initiatives'?{background:'var(--accent)',color:'white'}:{}}>Initiatives</button>
              <button className={`view-btn ${page==='clients'?'active':''}`} onClick={()=>{setPage('clients');setSelectedClient(null);}} style={page==='clients'?{background:'var(--accent)',color:'white'}:{}}>Clients</button>
          </div>
          <button className="refresh-btn" onClick={load}>↻ Refresh</button>
          <span className="timestamp">{ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>
          <div className="user-badge">
            <span className="user-name">{user.name}</span>
            <span className="user-role">{user.role}</span>
          </div>
          <button className="logout-btn" onClick={handleLogout}>Logout</button>
        </div>
      </div>

      {/* Stats */}
      {page === 'board' && (<>
      <div className="stats-bar">
        <div className="stat-card">
          <div className="stat-label">Pipeline Deals</div>
          <div className="stat-value" style={{color:'var(--accent)'}}>{stats.total}</div>
          <div className="stat-sub">{stats.active} active</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Pipeline Value</div>
          <div className="stat-value" style={{color:'var(--teal)'}}>{fmt(stats.val)}</div>
          <div className="stat-sub">Weighted: {fmt(stats.w)}</div>
        </div>
        <div className={"stat-card clickable" + (statusF==='stalled'?' active-red':'')} onClick={() => { if (statusF==='stalled') { setStatusF('all'); } else { setStatusF('stalled'); setStageF('all'); setRegionF('all'); setSearch(''); } }} style={{cursor:'pointer'}}>
          <div className="stat-label">Stalled</div>
          <div className="stat-value" style={{color:'var(--red)'}}>{stats.stalled}</div>
          <div className="stat-sub">{statusF==='stalled' ? '✕ Clear filter' : 'Click to filter'}</div>
        </div>
        <div className={"stat-card clickable" + (statusF==='overdue'?' active-orange':'')} onClick={() => { if (statusF==='overdue') { setStatusF('all'); } else { setStatusF('overdue'); setStageF('all'); setRegionF('all'); setSearch(''); } }} style={{cursor:'pointer'}}>
          <div className="stat-label">Overdue Actions</div>
          <div className="stat-value" style={{color:'var(--orange)'}}>{stats.overdue}</div>
          <div className="stat-sub">{statusF==='overdue' ? '✕ Clear filter' : 'Click to filter'}</div>
        </div>
      </div>

      {/* Filters */}
      <div className="filter-bar">
        <input className="search-input" placeholder="Search deals…" value={search} onChange={e=>setSearch(e.target.value)} />
        <button className={`filter-chip ${stageF==='all'?'active':''}`} onClick={()=>setStageF('all')}>All</button>
        {STAGES.map(s => <button key={s.key} className={`filter-chip ${stageF===s.key?'active':''}`} onClick={()=>setStageF(s.key)}>{s.label}</button>)}
        <div className="filter-sep"></div>
        <button className={`filter-chip ${regionF==='all'?'active':''}`} onClick={()=>setRegionF('all')}>All Regions</button>
        {regions.map(r => <button key={r} className={`filter-chip ${regionF===r?'active':''}`} onClick={()=>setRegionF(r)}>{r}</button>)}
      </div>
      </>)}

      {/* Kanban */}
      {page === 'board' && view === 'kanban' && (
        <div className="kanban-container">
          {STAGES.map(stage => {
            const sd = filtered.filter(d => d.stage === stage.key).sort((a,b) => (b.deal_value||0) - (a.deal_value||0));
            const sv = sd.reduce((s,d) => s + (d.deal_value||0), 0);
            return (
              <div className="kanban-col" key={stage.key}>
                <div className="kanban-header" style={{background:stage.color}}>
                  <h3>{stage.label} <span className="kanban-count">{sd.length}</span></h3>
                  <span className="kanban-value">{fmt(sv)}</span>
                </div>
                <div className="kanban-cards">
                  {sd.map(d => {
                    const owner = tm[d.deal_owner_id];
                    const isStalled = d.status === 'stalled';
                    const dueDays = daysUntil(d.next_action_due);
                    const isOverdue = dueDays !== null && dueDays < 0;
                    return (
                      <div key={d.id} className={`deal-card ${isStalled?'stalled':''} ${isOverdue?'overdue':''}`} onClick={() => {setSelId(d.id); setPage('account');}}>
                        <div className="deal-name">{d.account_name}</div>
                        <div className="deal-project">{d.project_name}</div>
                        <div className="deal-meta">
                          {d.region && <span className="deal-tag tag-region">{d.region}</span>}
                          <span className="deal-tag tag-value">{fmt(d.deal_value,d.deal_value_note)}</span>
                          {isStalled && <span className="deal-tag tag-stalled">Stalled</span>}
                          {isOverdue && <span className="deal-tag tag-overdue">Overdue</span>}
                        </div>
                        {d.next_action && <div className="deal-action"><span className="deal-action-arrow">›</span>{d.next_action}</div>}
                        {d.next_action_due && <div className={`deal-due ${isOverdue?'overdue':''}`}>{isOverdue?`${-dueDays}d overdue`:`Due ${dueDays}d`}</div>}
                        {owner && <div className="deal-owner-row"><div className="deal-owner-avatar">{initials(owner.display_name)}</div><div className="deal-owner-name">{owner.display_name}</div></div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}


      {page === 'closing' && <ClosingZone deals={deals} teamMembers={team} user={user} onDealClick={(id) => {setSelId(id); setPage('account');}} />}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
